<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picazo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div id="lobby-screen" class="active-screen">
        
        <div class="theme-toggle">
            <i data-lucide="sun" class="icon-sun"></i>
            <div class="toggle-track"><div class="toggle-knob"></div></div>
            <i data-lucide="moon" class="icon-moon"></i>
        </div>

        <div class="glass-card">
            <div class="logo-container">
                <div class="logo-icon"></div> <h1 class="logo-text">Picazo</h1>
            </div>
            <p class="subtitle">The Ultimate Drawing Game</p>

            <input type="text" id="player-name" class="name-input" placeholder="Enter your name" autocomplete="off">

            <p class="avatar-label">Choose your avatar</p>
            <div class="avatar-selector">
                <button id="prev-avatar" class="arrow-btn"><i data-lucide="chevron-left"></i></button>
                <div class="avatar-circle">
                    <img id="current-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&hair=short&facialHair=beardLight" alt="Avatar">
                </div>
                <button id="next-avatar" class="arrow-btn"><i data-lucide="chevron-right"></i></button>
            </div>

            <button id="play-btn" class="primary-btn">PLAY NOW</button>
            <button class="secondary-btn">CREATE PRIVATE ROOM</button>
        </div>

        <p class="footer-text">Made with ❤️ for testing</p>
    </div>

    <div id="game-page" class="hidden-screen">
        <h2 style="color: white; text-align: center; margin-top: 50px;">Game Screen Loading...</h2>
        <p style="color: white; text-align: center;">(This proves the button works! We will build the canvas here next.)</p>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
