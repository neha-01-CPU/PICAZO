<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picazo - The Ultimate Drawing Game</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* --- CSS: THE SKIN --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body {
            background: linear-gradient(135deg, #a8cbf0 0%, #d8b4e2 50%, #f6c1d4 100%);
            height: 100vh; width: 100vw;
            overflow: hidden;
            color: #333;
        }

        .hidden { display: none !important; }

        /* --- LOBBY SCREEN --- */
        #lobby-screen {
            height: 100%; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%; max-width: 400px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .logo-text { font-size: 2.5rem; color: #7c3aed; font-weight: 800; margin-bottom: 5px; letter-spacing: -1px; }
        .subtitle { font-size: 0.95rem; color: #555; margin-bottom: 30px; font-weight: 500; }

        .name-input {
            width: 100%; padding: 16px; border: 2px solid rgba(124, 58, 237, 0.3); border-radius: 14px;
            outline: none; text-align: center; font-size: 1.1rem; background: rgba(255,255,255,0.8);
            margin-bottom: 25px; transition: border 0.3s;
        }
        .name-input:focus { border: 2px solid #7c3aed; }

        .avatar-label { font-weight: 600; margin-bottom: 15px; font-size: 0.95rem; }
        .avatar-selector { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        
        .avatar-frame {
            width: 110px; height: 110px; border-radius: 16px; /* Square frames with rounded edges */
            background: rgba(255,255,255,0.8); border: 3px solid #7c3aed;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.05);
        }
        #current-avatar { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.2s; }
        .arrow-btn { background: rgba(255,255,255,0.5); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .arrow-btn:hover { background: rgba(255,255,255,0.9); }

        .primary-btn {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            background: linear-gradient(90deg, #7c3aed, #6d28d9); color: white;
            font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3); transition: transform 0.1s;
        }
        .primary-btn:active { transform: scale(0.98); }

        /* --- GAME SCREEN (MOBILE FIRST) --- */
        #game-page {
            height: 100%; width: 100%; padding: 10px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .game-header {
            flex: 0 0 auto; height: 60px;
            background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.6);
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .header-left { display: flex; flex-direction: column; align-items: flex-start; }
        .timer { font-size: 1.2rem; font-weight: 800; color: #7c3aed; display: flex; align-items: center; gap: 5px; }
        .round-info { font-size: 0.7rem; color: #555; font-weight: 600; }
        .word-blanks { font-size: 1.5rem; letter-spacing: 3px; font-weight: 800; color: #333; }
        .mute-btn { background: none; border: none; color: #555; cursor: pointer; }

        .canvas-container {
            flex: 1 1 50%; /* Takes up upper half perfectly */
            background: white; border-radius: 20px; position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden;
            display: flex; flex-direction: column;
        }
        canvas { flex: 1; width: 100%; cursor: crosshair; }
        
        .toolbar {
            height: 50px; background: rgba(248, 250, 252, 0.9); border-top: 1px solid #e2e8f0;
            display: flex; justify-content: center; align-items: center; gap: 15px;
        }
        .tool-btn { background: none; border: none; color: #64748b; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .tool-btn.active { color: #7c3aed; }

        .bottom-split {
            flex: 1 1 40%; /* Takes up bottom half */
            display: flex; gap: 10px;
        }
        
        .panel {
            flex: 1; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.6);
            display: flex; flex-direction: column; overflow: hidden; padding: 10px;
        }
        .panel h3 { font-size: 0.9rem; text-align: center; margin-bottom: 10px; color: #555; }
        
        /* Leaderboard styling */
        .player-list { flex: 1; overflow-y: auto; list-style: none; }
        .player-item { display: flex; align-items: center; gap: 10px; padding: 5px; background: rgba(255,255,255,0.6); border-radius: 10px; margin-bottom: 5px; }
        .player-item img { width: 35px; height: 35px; border-radius: 8px; object-fit: cover; }
        .player-info { display: flex; flex-direction: column; }
        .p-name { font-size: 0.85rem; font-weight: 700; }
        .p-score { font-size: 0.75rem; color: #666; }

        /* Chat styling */
        .chat-history { flex: 1; overflow-y: auto; font-size: 0.85rem; margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px; }
        .chat-msg { padding: 5px 8px; background: rgba(255,255,255,0.7); border-radius: 8px; }
        .chat-system { color: #7c3aed; font-weight: bold; font-style: italic; background: none; }
        .chat-input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; outline: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="lobby-screen">
        <div class="glass-card">
            <h1 class="logo-text">Picazo</h1>
            <p class="subtitle">The Ultimate Drawing Game</p>

            <input type="text" id="player-name" class="name-input" placeholder="Enter your name" autocomplete="off">

            <p class="avatar-label">Choose your avatar</p>
            <div class="avatar-selector">
                <button id="prev-avatar" class="arrow-btn"><i data-lucide="chevron-left"></i></button>
                <div class="avatar-frame">
                    <img id="current-avatar" src="https://i.pravatar.cc/250?img=11" alt="Avatar">
                </div>
                <button id="next-avatar" class="arrow-btn"><i data-lucide="chevron-right"></i></button>
            </div>

            <button id="play-btn" class="primary-btn">PLAY NOW</button>
        </div>
    </div>

    <div id="game-page" class="hidden">
        
        <div class="game-header">
            <div class="header-left">
                <div class="timer"><i data-lucide="clock" size="18"></i> 60</div>
                <div class="round-info">Round 1 of 5</div>
            </div>
            <div class="word-blanks">_ _ _ _ _ <span style="font-size: 0.8rem; color: #888;">(5)</span></div>
            <button class="mute-btn"><i data-lucide="volume-2" size="20"></i></button>
        </div>

        <div class="canvas-container">
            <canvas id="drawingBoard"></canvas>
            <div class="toolbar">
                <button class="tool-btn active"><i data-lucide="pencil" size="20"></i></button>
                <button class="tool-btn"><i data-lucide="eraser" size="20"></i></button>
                <button class="tool-btn"><i data-lucide="paint-bucket" size="20"></i></button>
                <div style="width: 20px; height: 20px; background: black; border-radius: 50%; cursor: pointer;"></div>
                <button class="tool-btn"><i data-lucide="undo-2" size="20"></i></button>
                <button class="tool-btn"><i data-lucide="trash-2" size="20"></i></button>
            </div>
        </div>

        <div class="bottom-split">
            <div class="panel leaderboard">
                <h3>Players</h3>
                <ul class="player-list">
                    <li class="player-item">
                        <img id="in-game-avatar" src="https://i.pravatar.cc/250?img=11" alt="Player">
                        <div class="player-info">
                            <span class="p-name" id="in-game-name">You</span>
                            <span class="p-score">0 pts <i data-lucide="pencil" size="10" style="color: #7c3aed;"></i></span>
                        </div>
                    </li>
                </ul>
            </div>
            <div class="panel chat">
                <h3>Chat</h3>
                <div class="chat-history">
                    <span class="chat-msg chat-system">System: Game started!</span>
                </div>
                <input type="text" class="chat-input" placeholder="Type your guess...">
            </div>
        </div>

    </div>

    <script>
        // --- JAVASCRIPT: THE BRAIN ---
        lucide.createIcons();

        const lobbyScreen = document.getElementById('lobby-screen');
        const gamePage = document.getElementById('game-page');
        const playBtn = document.getElementById('play-btn');
        const playerNameInput = document.getElementById('player-name');
        
        // Avatar Logic (Using ultra-realistic/stylish placeholders)
        const currentAvatar = document.getElementById('current-avatar');
        const inGameAvatar = document.getElementById('in-game-avatar');
        const inGameName = document.getElementById('in-game-name');
        const avatars = [
            "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=250&q=80", // Stylish male
            "https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=250&q=80", // Stylish female
            "https://images.unsplash.com/photo-1599566150163-29194dcaad36?auto=format&fit=crop&w=250&q=80", // Male, spectacles
            "https://images.unsplash.com/photo-1580489944761-15a19d654956?auto=format&fit=crop&w=250&q=80"  // Female, portrait
        ];
        
        let avatarIndex = 0;

        document.getElementById('next-avatar').addEventListener('click', () => {
            avatarIndex = (avatarIndex + 1) % avatars.length;
            currentAvatar.src = avatars[avatarIndex];
        });

        document.getElementById('prev-avatar').addEventListener('click', () => {
            avatarIndex = (avatarIndex - 1 + avatars.length) % avatars.length;
            currentAvatar.src = avatars[avatarIndex];
        });

        // The Fix to jump into the game perfectly
        playBtn.addEventListener('click', () => {
            const name = playerNameInput.value.trim();
            if (name === "") {
                alert("Please enter a name!");
                return;
            }

            // Transfer lobby data to the game screen
            inGameName.textContent = name;
            inGameAvatar.src = avatars[avatarIndex];

            // Switch screens
            lobbyScreen.classList.add('hidden');
            gamePage.classList.remove('hidden');
        });
    </script>
</body>
</html>
