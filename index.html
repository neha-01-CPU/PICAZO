<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picazo - The Ultimate Drawing Game</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* --- CSS: THE SKIN --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body {
            background: linear-gradient(135deg, #a8cbf0 0%, #d8b4e2 50%, #f6c1d4 100%);
            height: 100vh; width: 100vw;
            overflow: hidden;
            color: #333;
        }

        .hidden { display: none !important; }

        /* --- LOBBY SCREEN --- */
        #lobby-screen {
            height: 100%; width: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%; max-width: 400px;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .logo-text { font-size: 2.5rem; color: #7c3aed; font-weight: 800; margin-bottom: 5px; letter-spacing: -1px; }
        .subtitle { font-size: 0.95rem; color: #555; margin-bottom: 30px; font-weight: 500; }

        .name-input {
            width: 100%; padding: 16px; border: 2px solid rgba(124, 58, 237, 0.3); border-radius: 14px;
            outline: none; text-align: center; font-size: 1.1rem; background: rgba(255,255,255,0.8);
            margin-bottom: 25px; transition: border 0.3s;
        }
        .name-input:focus { border: 2px solid #7c3aed; }

        .avatar-label { font-weight: 600; margin-bottom: 15px; font-size: 0.95rem; }
        .avatar-selector { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        
        .avatar-frame {
            width: 110px; height: 110px; border-radius: 16px;
            background: rgba(255,255,255,0.8); border: 3px solid #7c3aed;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.05);
        }
        #current-avatar { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.2s; }
        .arrow-btn { background: rgba(255,255,255,0.5); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .arrow-btn:hover { background: rgba(255,255,255,0.9); }

        .primary-btn {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            background: linear-gradient(90deg, #7c3aed, #6d28d9); color: white;
            font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3); transition: transform 0.1s;
        }
        .primary-btn:active { transform: scale(0.98); }

        /* --- GAME SCREEN --- */
        #game-page {
            height: 100%; width: 100%; padding: 10px;
            display: flex; flex-direction: column; gap: 10px;
        }

        .game-header {
            flex: 0 0 auto; height: 60px;
            background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.6);
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .header-left { display: flex; flex-direction: column; align-items: flex-start; }
        .timer { font-size: 1.2rem; font-weight: 800; color: #7c3aed; display: flex; align-items: center; gap: 5px; }
        .round-info { font-size: 0.7rem; color: #555; font-weight: 600; }
        .word-blanks { font-size: 1.5rem; letter-spacing: 3px; font-weight: 800; color: #333; }
        .mute-btn { background: none; border: none; color: #555; cursor: pointer; }

        .canvas-container {
            flex: 1 1 50%;
            background: white; border-radius: 20px; position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden;
            display: flex; flex-direction: column;
        }
        canvas { flex: 1; width: 100%; cursor: crosshair; touch-action: none; }
        
        .toolbar {
            height: 55px; background: rgba(248, 250, 252, 0.95); border-top: 1px solid #e2e8f0;
            display: flex; justify-content: center; align-items: center; gap: 12px; padding: 0 10px;
        }
        .tool-btn { background: none; border: none; color: #64748b; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
        .tool-btn.active { color: #7c3aed; }
        
        /* New Tools Styling */
        .color-picker { width: 30px; height: 30px; border: none; border-radius: 50%; cursor: pointer; padding: 0; background: transparent; }
        .color-picker::-webkit-color-swatch-wrapper { padding: 0; }
        .color-picker::-webkit-color-swatch { border: 2px solid #ddd; border-radius: 50%; }
        .brush-slider { width: 60px; accent-color: #7c3aed; }

        .bottom-split {
            flex: 1 1 40%; display: flex; gap: 10px;
        }
        
        .panel {
            flex: 1; background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.6);
            display: flex; flex-direction: column; overflow: hidden; padding: 10px;
        }
        .panel h3 { font-size: 0.9rem; text-align: center; margin-bottom: 10px; color: #555; }
        
        .player-list { flex: 1; overflow-y: auto; list-style: none; }
        .player-item { display: flex; align-items: center; gap: 10px; padding: 5px; background: rgba(255,255,255,0.6); border-radius: 10px; margin-bottom: 5px; }
        .player-item img { width: 35px; height: 35px; border-radius: 8px; object-fit: cover; }
        .player-info { display: flex; flex-direction: column; }
        .p-name { font-size: 0.85rem; font-weight: 700; }
        .p-score { font-size: 0.75rem; color: #666; }

        .chat-history { flex: 1; overflow-y: auto; font-size: 0.85rem; margin-bottom: 10px; display: flex; flex-direction: column; gap: 5px; }
        .chat-msg { padding: 6px 10px; background: rgba(255,255,255,0.8); border-radius: 8px; word-wrap: break-word; }
        .chat-system { color: #7c3aed; font-weight: bold; font-style: italic; background: none; }
        .chat-input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; outline: none; font-size: 0.9rem; }
        .chat-input:focus { border: 1px solid #7c3aed; }
    </style>
</head>
<body>

    <div id="lobby-screen">
        <div class="glass-card">
            <h1 class="logo-text">Picazo</h1>
            <p class="subtitle">The Ultimate Drawing Game</p>

            <input type="text" id="player-name" class="name-input" placeholder="Enter your name" autocomplete="off" maxlength="15">

            <p class="avatar-label">Choose your avatar</p>
            <div class="avatar-selector">
                <button id="prev-avatar" class="arrow-btn"><i data-lucide="chevron-left"></i></button>
                <div class="avatar-frame">
                    <img id="current-avatar" src="" alt="Avatar">
                </div>
                <button id="next-avatar" class="arrow-btn"><i data-lucide="chevron-right"></i></button>
            </div>

            <button id="play-btn" class="primary-btn">PLAY NOW</button>
        </div>
    </div>

    <div id="game-page" class="hidden">
        
        <div class="game-header">
            <div class="header-left">
                <div class="timer"><i data-lucide="clock" size="18"></i> 60</div>
                <div class="round-info">Round 1 of 5</div>
            </div>
            <div class="word-blanks">_ _ _ _ _ <span style="font-size: 0.8rem; color: #888;">(5)</span></div>
            <button class="mute-btn"><i data-lucide="volume-2" size="20"></i></button>
        </div>

        <div class="canvas-container">
            <canvas id="drawingBoard"></canvas>
            
            <div class="toolbar">
                <button id="tool-pencil" class="tool-btn active"><i data-lucide="pencil" size="20"></i></button>
                <input type="color" id="tool-color" class="color-picker" value="#000000">
                <input type="range" id="tool-size" class="brush-slider" min="1" max="30" value="3">
                <button id="tool-eraser" class="tool-btn"><i data-lucide="eraser" size="20"></i></button>
                <button id="tool-fill" class="tool-btn"><i data-lucide="paint-bucket" size="20"></i></button>
                <button id="tool-undo" class="tool-btn"><i data-lucide="undo-2" size="20"></i></button>
                <button id="tool-trash" class="tool-btn"><i data-lucide="trash-2" size="20"></i></button>
            </div>
        </div>

        <div class="bottom-split">
            <div class="panel leaderboard">
                <h3>Players</h3>
                <ul class="player-list">
                    <li class="player-item">
                        <img id="in-game-avatar" src="" alt="Player">
                        <div class="player-info">
                            <span class="p-name" id="in-game-name">You</span>
                            <span class="p-score">0 pts <i data-lucide="pencil" size="10" style="color: #7c3aed;"></i></span>
                        </div>
                    </li>
                </ul>
            </div>
            <div class="panel chat">
                <h3>Chat</h3>
                <div class="chat-history" id="chat-box">
                    <span class="chat-msg chat-system">System: Game started!</span>
                </div>
                <input type="text" id="chat-input" class="chat-input" placeholder="Type your guess..." autocomplete="off">
            </div>
        </div>

    </div>

    <script>
        // --- JAVASCRIPT: THE BRAIN & ENGINE V2 ---
        lucide.createIcons();

        // --- 1. 12 PREMIUM AVATARS ---
        const avatars = [
            "https://api.dicebear.com/7.x/micah/svg?seed=P1&backgroundColor=b6e3f4",  // Animated 1
            "https://api.dicebear.com/7.x/shapes/svg?seed=P2&backgroundColor=c0aede", // Abstract 1
            "https://api.dicebear.com/7.x/bottts/svg?seed=P3&backgroundColor=ffd5dc", // Robot 1
            "https://api.dicebear.com/7.x/micah/svg?seed=P4&backgroundColor=ffdfbf",  // Animated 2
            "https://api.dicebear.com/7.x/shapes/svg?seed=P5&backgroundColor=d1d4f9", // Abstract 2
            "https://api.dicebear.com/7.x/micah/svg?seed=P6&backgroundColor=b6e3f4",  // Animated 3
            "https://api.dicebear.com/7.x/bottts/svg?seed=P7&backgroundColor=c0aede", // Robot 2
            "https://api.dicebear.com/7.x/shapes/svg?seed=P8&backgroundColor=ffd5dc", // Abstract 3
            "https://api.dicebear.com/7.x/micah/svg?seed=P9&backgroundColor=ffdfbf",  // Animated 4
            "https://api.dicebear.com/7.x/bottts/svg?seed=P10&backgroundColor=b6e3f4",// Robot 3
            "https://api.dicebear.com/7.x/shapes/svg?seed=P11&backgroundColor=d1d4f9",// Abstract 4
            "https://api.dicebear.com/7.x/micah/svg?seed=P12&backgroundColor=c0aede"  // Animated 5
        ];

        let avatarIndex = 0;
        document.getElementById('current-avatar').src = avatars[avatarIndex];

        document.getElementById('next-avatar').addEventListener('click', () => {
            avatarIndex = (avatarIndex + 1) % avatars.length;
            document.getElementById('current-avatar').src = avatars[avatarIndex];
        });

        document.getElementById('prev-avatar').addEventListener('click', () => {
            avatarIndex = (avatarIndex - 1 + avatars.length) % avatars.length;
            document.getElementById('current-avatar').src = avatars[avatarIndex];
        });

        // --- 2. SCREEN TRANSITION & START ENGINE ---
        document.getElementById('play-btn').addEventListener('click', () => {
            const name = document.getElementById('player-name').value.trim();
            if (name === "") return alert("Please enter a name!");

            document.getElementById('in-game-name').textContent = name;
            document.getElementById('in-game-avatar').src = avatars[avatarIndex];

            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('game-page').classList.remove('hidden');
            
            setTimeout(initCanvas, 100); 
        });

        // --- 3. THE DRAWING ENGINE WITH FULL TOOLS ---
        const canvas = document.getElementById('drawingBoard');
        const ctx = canvas.getContext('2d');
        
        let isDrawing = false;
        let isErasing = false;
        let drawingHistory = [];
        
        // Tool Elements
        const colorPicker = document.getElementById('tool-color');
        const sizeSlider = document.getElementById('tool-size');
        const btnPencil = document.getElementById('tool-pencil');
        const btnEraser = document.getElementById('tool-eraser');

        function initCanvas() {
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight - 55; // minus toolbar height
            
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveState();
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            if (e.touches) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function startPosition(e) {
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(getPos(e).x, getPos(e).y);
            draw(e);
        }

        function endPosition() {
            if (isDrawing) { isDrawing = false; ctx.closePath(); saveState(); }
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault(); 
            
            ctx.lineWidth = sizeSlider.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            if (isErasing) {
                ctx.strokeStyle = "white";
            } else {
                ctx.strokeStyle = colorPicker.value;
            }

            ctx.lineTo(getPos(e).x, getPos(e).y);
            ctx.stroke();
        }

        // Canvas Listeners
        canvas.addEventListener('mousedown', startPosition); canvas.addEventListener('mouseup', endPosition);
        canvas.addEventListener('mousemove', draw); canvas.addEventListener('mouseout', endPosition);
        canvas.addEventListener('touchstart', startPosition, {passive: false});
        canvas.addEventListener('touchend', endPosition); canvas.addEventListener('touchmove', draw, {passive: false});

        // --- 4. WIRING THE BUTTONS ---
        
        // Pencil
        btnPencil.addEventListener('click', () => {
            isErasing = false;
            btnPencil.classList.add('active');
            btnEraser.classList.remove('active');
        });

        // Eraser
        btnEraser.addEventListener('click', () => {
            isErasing = true;
            btnEraser.classList.add('active');
            btnPencil.classList.remove('active');
        });

        // Fill Bucket (Fills entire background)
        document.getElementById('tool-fill').addEventListener('click', () => {
            ctx.fillStyle = colorPicker.value;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveState();
        });

        // Clear Trash Can
        document.getElementById('tool-trash').addEventListener('click', () => {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveState();
        });

        // Undo
        function saveState() {
            drawingHistory.push(canvas.toDataURL());
            if (drawingHistory.length > 15) drawingHistory.shift(); 
        }

        document.getElementById('tool-undo').addEventListener('click', () => {
            if (drawingHistory.length > 1) {
                drawingHistory.pop(); 
                const img = new Image();
                img.src = drawingHistory[drawingHistory.length - 1];
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
            }
        });

        // --- 5. CHAT FUNCTIONALITY ---
        const chatInput = document.getElementById('chat-input');
        const chatBox = document.getElementById('chat-box');

        chatInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && this.value.trim() !== '') {
                const msgText = this.value.trim();
                const name = document.getElementById('in-game-name').textContent;
                
                // Create new message HTML
                const msgSpan = document.createElement('span');
                msgSpan.className = 'chat-msg';
                msgSpan.innerHTML = `<strong>${name}:</strong> ${msgText}`;
                
                chatBox.appendChild(msgSpan);
                this.value = ''; // Clear input
                
                // Auto-scroll to bottom
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        });
    </script>
</body>
</html>
