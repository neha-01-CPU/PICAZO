<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Picazo — Draw & Guess</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Righteous&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
/* ============================================================
   CSS RESET & ROOT VARIABLES
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-base: #dde8f5;
  --bg-mid: #eaf2fc;
  --glass-bg: rgba(255,255,255,0.55);
  --glass-bg-strong: rgba(255,255,255,0.75);
  --glass-border: rgba(255,255,255,0.85);
  --glass-shadow: 0 8px 32px rgba(100,140,200,0.18);
  --blue-primary: #4a90d9;
  --blue-light: #7db8f0;
  --blue-glow: rgba(74,144,217,0.35);
  --accent: #5c6ef8;
  --accent-glow: rgba(92,110,248,0.3);
  --text-dark: #1a2540;
  --text-mid: #4a5880;
  --text-light: #8a9bc0;
  --correct-green: #34c97b;
  --warn-red: #f05060;
  --warn-glow: rgba(240,80,96,0.4);
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;
  --font-main: 'Nunito', sans-serif;
  --font-display: 'Righteous', cursive;
  --transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: var(--font-main);
  background: linear-gradient(135deg, #c8ddf5 0%, #ddeafc 40%, #e8f0fb 100%);
  color: var(--text-dark);
  -webkit-font-smoothing: antialiased;
}

/* Animated background blobs */
body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.45;
  pointer-events: none;
  z-index: 0;
}
body::before {
  width: 500px; height: 500px;
  background: radial-gradient(circle, #a8c8f8, transparent 70%);
  top: -100px; left: -100px;
  animation: blobFloat1 12s ease-in-out infinite alternate;
}
body::after {
  width: 400px; height: 400px;
  background: radial-gradient(circle, #c8b8f8, transparent 70%);
  bottom: -80px; right: -80px;
  animation: blobFloat2 15s ease-in-out infinite alternate;
}
@keyframes blobFloat1 { to { transform: translate(60px, 40px) scale(1.1); } }
@keyframes blobFloat2 { to { transform: translate(-40px, -60px) scale(1.15); } }

/* ============================================================
   GLASS UTILITY
   ============================================================ */
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(18px) saturate(180%);
  -webkit-backdrop-filter: blur(18px) saturate(180%);
  border: 1.5px solid var(--glass-border);
  box-shadow: var(--glass-shadow);
}
.glass-strong {
  background: var(--glass-bg-strong);
  backdrop-filter: blur(24px) saturate(200%);
  -webkit-backdrop-filter: blur(24px) saturate(200%);
  border: 1.5px solid var(--glass-border);
  box-shadow: 0 12px 40px rgba(80,120,200,0.2);
}

/* ============================================================
   SCREENS — LOBBY & GAME
   ============================================================ */
.screen {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.45s cubic-bezier(0.4,0,0.2,1), transform 0.45s cubic-bezier(0.4,0,0.2,1);
}
.screen.hidden {
  opacity: 0;
  pointer-events: none;
  transform: scale(1.04);
}

/* ============================================================
   LOBBY SCREEN
   ============================================================ */
#lobby-screen {
  padding: 16px;
}
.lobby-card {
  border-radius: 28px;
  padding: 36px 32px 32px;
  max-width: 440px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  position: relative;
  z-index: 1;
}
.lobby-logo {
  font-family: var(--font-display);
  font-size: 2.8rem;
  background: linear-gradient(135deg, var(--blue-primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
  text-shadow: none;
  filter: drop-shadow(0 2px 12px var(--blue-glow));
}
.lobby-tagline {
  font-size: 0.9rem;
  color: var(--text-light);
  margin-top: -18px;
  letter-spacing: 0.5px;
}

/* Avatar Slider */
.avatar-section { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; }
.avatar-section label { font-size: 0.82rem; font-weight: 700; color: var(--text-mid); text-transform: uppercase; letter-spacing: 1px; }
.avatar-slider {
  display: flex;
  align-items: center;
  gap: 16px;
}
.avatar-nav-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--blue-primary), var(--accent));
  color: white;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px var(--blue-glow);
  transition: var(--transition);
  flex-shrink: 0;
}
.avatar-nav-btn:hover { transform: scale(1.12); box-shadow: 0 6px 22px var(--accent-glow); }
.avatar-frame {
  width: 96px; height: 96px;
  border-radius: 18px;
  overflow: hidden;
  border: 3px solid var(--glass-border);
  box-shadow: 0 8px 28px var(--blue-glow);
  position: relative;
  background: #e0eaf8;
  transition: box-shadow 0.3s;
}
.avatar-frame.glow { box-shadow: 0 0 0 3px var(--accent), 0 8px 28px var(--accent-glow); }
.avatar-frame img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity 0.22s;
}
.avatar-dots { display: flex; gap: 6px; }
.avatar-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--glass-border);
  border: 1.5px solid var(--blue-light);
  transition: var(--transition);
  cursor: pointer;
}
.avatar-dot.active { background: var(--blue-primary); transform: scale(1.25); }

/* Name Input */
.name-section { width: 100%; display: flex; flex-direction: column; gap: 8px; }
.name-section label { font-size: 0.82rem; font-weight: 700; color: var(--text-mid); text-transform: uppercase; letter-spacing: 1px; }
.name-input {
  width: 100%;
  padding: 12px 16px;
  border-radius: var(--radius-md);
  border: 1.5px solid var(--glass-border);
  background: rgba(255,255,255,0.6);
  font-family: var(--font-main);
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-dark);
  outline: none;
  transition: var(--transition);
  backdrop-filter: blur(10px);
}
.name-input:focus {
  border-color: var(--blue-primary);
  box-shadow: 0 0 0 3px var(--blue-glow);
  background: rgba(255,255,255,0.8);
}
.name-input::placeholder { color: var(--text-light); font-weight: 500; }

/* Lobby Settings Row */
.lobby-settings {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.setting-group { display: flex; flex-direction: column; gap: 6px; }
.setting-group label { font-size: 0.78rem; font-weight: 700; color: var(--text-mid); text-transform: uppercase; letter-spacing: 0.8px; }
.setting-select {
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--glass-border);
  background: rgba(255,255,255,0.6);
  font-family: var(--font-main);
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text-dark);
  cursor: pointer;
  outline: none;
  appearance: none;
  backdrop-filter: blur(10px);
}

/* Play Button */
.play-btn {
  width: 100%;
  padding: 15px;
  border-radius: var(--radius-md);
  border: none;
  background: linear-gradient(135deg, var(--blue-primary) 0%, var(--accent) 100%);
  color: white;
  font-family: var(--font-display);
  font-size: 1.15rem;
  letter-spacing: 1.5px;
  cursor: pointer;
  box-shadow: 0 8px 28px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.2);
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.play-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.15), transparent);
  pointer-events: none;
}
.play-btn:hover { transform: translateY(-2px); box-shadow: 0 14px 36px var(--accent-glow); }
.play-btn:active { transform: translateY(0); }

/* ============================================================
   GAME SCREEN
   ============================================================ */
#game-screen {
  padding: 0;
  align-items: stretch;
  justify-content: stretch;
  flex-direction: column;
}
.game-wrap {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 10px;
  gap: 8px;
  position: relative;
  z-index: 1;
  overflow: hidden;
}

/* Header */
.game-header {
  border-radius: var(--radius-lg);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
  z-index: 5;
}
/* Timer Zone */
.timer-zone { display: flex; flex-direction: column; align-items: center; min-width: 80px; }
.timer-clock {
  font-family: var(--font-display);
  font-size: 2rem;
  line-height: 1;
  color: var(--blue-primary);
  text-shadow: 0 0 18px var(--blue-glow);
  transition: color 0.5s, text-shadow 0.5s;
  position: relative;
}
.timer-clock.warn { color: var(--warn-red); text-shadow: 0 0 22px var(--warn-glow); animation: timerPulse 0.6s infinite alternate; }
@keyframes timerPulse { from { transform: scale(1); } to { transform: scale(1.08); } }
.timer-ring {
  width: 52px; height: 52px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.timer-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.timer-ring-bg { fill: none; stroke: rgba(74,144,217,0.15); stroke-width: 4; }
.timer-ring-fg { fill: none; stroke: var(--blue-primary); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 1s linear, stroke 0.5s; }
.timer-ring-fg.warn { stroke: var(--warn-red); }
.timer-ring-num {
  font-family: var(--font-display);
  font-size: 1.1rem;
  color: var(--blue-primary);
  position: relative;
  z-index: 1;
  transition: color 0.5s;
}
.timer-ring-num.warn { color: var(--warn-red); }
.round-label { font-size: 0.72rem; font-weight: 700; color: var(--text-light); letter-spacing: 0.5px; margin-top: 3px; white-space: nowrap; }

/* Word Display */
.word-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.word-blanks {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  justify-content: center;
}
.word-blank {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.word-blank-char {
  font-family: var(--font-display);
  font-size: 1.3rem;
  color: var(--text-dark);
  min-width: 18px;
  text-align: center;
  line-height: 1;
  transition: all 0.3s;
}
.word-blank-line {
  width: 100%; height: 2.5px;
  background: linear-gradient(to right, var(--blue-primary), var(--accent));
  border-radius: 2px;
  min-width: 18px;
}
.word-hint { font-size: 0.72rem; color: var(--text-light); font-weight: 600; }
.drawing-label {
  font-size: 0.78rem;
  font-weight: 800;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Mute */
.mute-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: 1.5px solid var(--glass-border);
  background: rgba(255,255,255,0.5);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
  backdrop-filter: blur(10px);
  color: var(--text-mid);
  flex-shrink: 0;
}
.mute-btn:hover { background: rgba(255,255,255,0.8); transform: scale(1.08); }

/* Main Content Area */
.main-content {
  flex: 1;
  display: flex;
  gap: 8px;
  min-height: 0;
  overflow: hidden;
}

/* Leaderboard */
.leaderboard-panel {
  border-radius: var(--radius-lg);
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow: hidden;
}
.panel-title {
  font-size: 0.75rem;
  font-weight: 800;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  text-align: center;
  padding-bottom: 4px;
  border-bottom: 1px solid rgba(74,144,217,0.12);
}
.leaderboard-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
.leaderboard-list::-webkit-scrollbar { width: 3px; }
.leaderboard-list::-webkit-scrollbar-thumb { background: var(--blue-light); border-radius: 2px; }
.player-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 8px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  position: relative;
}
.player-row:hover { background: rgba(74,144,217,0.1); }
.player-row.drawing { background: rgba(92,110,248,0.12); border: 1px solid rgba(92,110,248,0.25); }
.player-rank {
  font-size: 0.7rem; font-weight: 800;
  color: var(--text-light);
  min-width: 14px;
  text-align: center;
}
.player-avatar-sm {
  width: 30px; height: 30px;
  border-radius: 8px;
  overflow: hidden;
  border: 1.5px solid var(--glass-border);
  flex-shrink: 0;
  background: #dde8f5;
}
.player-avatar-sm img { width: 100%; height: 100%; object-fit: cover; display: block; }
.player-info { flex: 1; min-width: 0; }
.player-name { font-size: 0.78rem; font-weight: 700; color: var(--text-dark); truncate: true; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-score { font-size: 0.68rem; font-weight: 600; color: var(--text-light); }
.player-drawing-badge {
  font-size: 0.6rem; font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--blue-primary));
  color: white; padding: 2px 6px; border-radius: 20px;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

/* Canvas Area */
.canvas-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0;
  position: relative;
}
.canvas-wrap {
  flex: 1;
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
  border: 1.5px solid var(--glass-border);
  box-shadow: 0 8px 32px rgba(80,120,200,0.18);
  background: #fff;
  min-height: 0;
}
#draw-canvas {
  display: block;
  width: 100%;
  height: 100%;
  cursor: crosshair;
  touch-action: none; /* Critical: prevent scroll on draw */
}
#draw-canvas.eraser-mode { cursor: cell; }

/* Waiting overlay */
.waiting-overlay {
  position: absolute;
  inset: 0;
  background: rgba(220,234,252,0.55);
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-lg);
  z-index: 10;
  transition: opacity 0.4s;
}
.waiting-overlay.hidden { opacity: 0; pointer-events: none; }
.waiting-msg {
  border-radius: var(--radius-lg);
  padding: 24px 28px;
  text-align: center;
  max-width: 260px;
}
.waiting-msg .wait-icon { font-size: 2.4rem; margin-bottom: 10px; animation: spin 3s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.waiting-msg h3 { font-size: 1rem; font-weight: 800; color: var(--text-dark); margin-bottom: 6px; }
.waiting-msg p { font-size: 0.82rem; color: var(--text-mid); line-height: 1.5; }

/* Toolbar (glass pill) */
.toolbar-pill {
  border-radius: 50px;
  padding: 7px 14px;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
  flex-shrink: 0;
}
.toolbar-pill::-webkit-scrollbar { display: none; }
.tool-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: var(--text-mid);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
  position: relative;
  flex-shrink: 0;
}
.tool-btn:hover, .tool-btn.active {
  background: linear-gradient(135deg, var(--blue-primary), var(--accent));
  color: white;
  box-shadow: 0 4px 14px var(--blue-glow);
}
.tool-btn:active { transform: scale(0.92); }
.tool-divider { width: 1px; height: 24px; background: rgba(74,144,217,0.2); margin: 0 4px; flex-shrink: 0; }

/* Brush size dots */
.brush-sizes { display: flex; align-items: center; gap: 5px; padding: 0 4px; flex-shrink: 0; }
.brush-dot {
  border-radius: 50%;
  background: var(--text-light);
  cursor: pointer;
  transition: var(--transition);
  flex-shrink: 0;
}
.brush-dot:hover, .brush-dot.active { background: var(--blue-primary); transform: scale(1.2); }

/* Color palette */
.color-palette { display: flex; align-items: center; gap: 5px; padding: 0 4px; flex-shrink: 0; }
.color-swatch {
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: var(--transition);
  flex-shrink: 0;
  width: 22px; height: 22px;
}
.color-swatch:hover { transform: scale(1.2); border-color: rgba(255,255,255,0.8); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.color-swatch.active { transform: scale(1.25); border-color: white; box-shadow: 0 0 0 2px var(--blue-primary), 0 2px 8px rgba(0,0,0,0.2); }

/* Chat */
.chat-panel {
  border-radius: var(--radius-lg);
  padding: 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  overflow: hidden;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding-right: 2px;
}
.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--blue-light); border-radius: 2px; }
.chat-msg {
  padding: 5px 8px;
  border-radius: 10px;
  font-size: 0.78rem;
  line-height: 1.4;
  animation: msgSlide 0.25s ease-out;
}
@keyframes msgSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.chat-msg .msg-name { font-weight: 800; color: var(--accent); }
.chat-msg .msg-text { color: var(--text-mid); }
.chat-msg.correct-msg { background: rgba(52,201,123,0.12); border-left: 3px solid var(--correct-green); }
.chat-msg.correct-msg .msg-text { color: var(--correct-green); font-weight: 700; }
.chat-msg.system-msg .msg-text { color: var(--text-light); font-style: italic; font-size: 0.73rem; }
.chat-input-row { display: flex; gap: 6px; }
.chat-input {
  flex: 1;
  padding: 9px 13px;
  border-radius: 50px;
  border: 1.5px solid var(--glass-border);
  background: rgba(255,255,255,0.6);
  font-family: var(--font-main);
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-dark);
  outline: none;
  transition: var(--transition);
  backdrop-filter: blur(10px);
}
.chat-input:focus { border-color: var(--blue-primary); box-shadow: 0 0 0 3px var(--blue-glow); background: rgba(255,255,255,0.8); }
.chat-input::placeholder { color: var(--text-light); font-weight: 500; }
.chat-send-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--blue-primary), var(--accent));
  color: white;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px var(--blue-glow);
  transition: var(--transition);
  flex-shrink: 0;
}
.chat-send-btn:hover { transform: scale(1.1); }

/* ============================================================
   WORD SELECTION OVERLAY
   ============================================================ */
.word-select-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(180,210,248,0.45);
  backdrop-filter: blur(14px);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
  gap: 20px;
  transition: opacity 0.3s, transform 0.3s;
}
.word-select-overlay.hidden { opacity: 0; pointer-events: none; transform: scale(0.96); }
.word-select-header { text-align: center; }
.word-select-header h2 { font-family: var(--font-display); font-size: 1.5rem; color: var(--text-dark); letter-spacing: 1px; }
.word-select-header p { font-size: 0.85rem; color: var(--text-mid); margin-top: 4px; }
.word-select-timer {
  font-family: var(--font-display);
  font-size: 2rem;
  color: var(--blue-primary);
  text-shadow: 0 0 20px var(--blue-glow);
}
.word-cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; padding: 0 16px; }
.word-card {
  border-radius: var(--radius-lg);
  padding: 20px 28px;
  cursor: pointer;
  transition: all 0.28s cubic-bezier(0.4,0,0.2,1);
  min-width: 120px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.word-card::before {
  content: '';
  position: absolute; inset: 0;

/* ============================================================

   ============================================================ */
.toast-container {
  position: fixed;
  bottom: 90px; left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex;
  flex-direction: column-reverse;
  gap: 8px;
  align-items: center;
  pointer-events: none;
}
.toast {
  border-radius: 50px;
  padding: 9px 18px;
  font-size: 0.82rem;
  font-weight: 700;
  display: flex; align-items: center; gap: 8px;
  animation: toastIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  max-width: 280px;
  pointer-events: none;
  white-space: nowrap;
}
@keyframes toastIn { from { opacity: 0; transform: translateY(16px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
.toast.fade-out { animation: toastOut 0.4s forwards; }
@keyframes toastOut { to { opacity: 0; transform: translateY(-8px) scale(0.9); } }
.toast-icon { font-size: 1rem; }
.toast.correct { background: rgba(52,201,123,0.85); color: white; box-shadow: 0 6px 20px rgba(52,201,123,0.4); }
.toast.system { background: var(--glass-bg-strong); color: var(--text-dark); box-shadow: var(--glass-shadow); }

/* ============================================================
   CONTEXT MENU (Player actions)
   ============================================================ */
.context-menu {
  position: fixed; z-index: 300;
  border-radius: var(--radius-md);

.ctx-btn {

}
.ctx-btn:hover { background: rgba(74,144,217,0.1); color: var(--text-dark); }
.ctx-btn.danger { color: var(--warn-red); }
.ctx-btn.danger:hover { background: rgba(240,80,96,0.08); }

/* Vote to kick banner */
.vote-banner {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);

  border-radius: var(--radius-md);

.vote-banner-text { flex: 1; }
.vote-banner-text strong { font-size: 0.88rem; color: var(--text-dark); display: block; }
.vote-banner-text span { font-size: 0.76rem; color: var(--text-mid); }
.vote-yes-btn, .vote-no-btn {

}

/* ============================================================

<script>
/* ============================================================
   PICAZO — GAME LOGIC & UI CONTROLLER
   ============================================================ */

// Initialize Lucide icons
lucide.createIcons();

/* ----------------------------------------------------------
   CONFIG & STATE
   ---------------------------------------------------------- */
const CONFIG = {
  WORD_SELECT_TIME: 15,   // seconds for word selection
  HINT_INTERVAL: 20,      // reveal hint letter every N seconds
  TOAST_DURATION: 5000,   // ms toast stays visible
};

const WORD_BANK = [
  { word: 'elephant', emoji: '🐘' },
  { word: 'pizza', emoji: '🍕' },
  { word: 'rainbow', emoji: '🌈' },
  { word: 'submarine', emoji: '🚢' },
  { word: 'telescope', emoji: '🔭' },
  { word: 'butterfly', emoji: '🦋' },
  { word: 'volcano', emoji: '🌋' },
  { word: 'astronaut', emoji: '👨‍🚀' },
  { word: 'octopus', emoji: '🐙' },
  { word: 'lighthouse', emoji: '🏮' },
  { word: 'dragon', emoji: '🐉' },
  { word: 'waterfall', emoji: '💧' },
  { word: 'pyramid', emoji: '🔺' },
  { word: 'spaceship', emoji: '🚀' },
  { word: 'treasure', emoji: '💎' },
  { word: 'hurricane', emoji: '🌀' },
  { word: 'keyboard', emoji: '⌨️' },
  { word: 'guitar', emoji: '🎸' },
  { word: 'sunflower', emoji: '🌻' },
  { word: 'dinosaur', emoji: '🦕' },
  { word: 'umbrella', emoji: '☂️' },
  { word: 'ambulance', emoji: '🚑' },
  { word: 'penguin', emoji: '🐧' },
  { word: 'fireworks', emoji: '🎆' },
  { word: 'basketball', emoji: '🏀' },
];

// Synthetic avatar colors (SVG-based avatars, no external APIs)
const AVATARS = [
  { label: 'Alex', color: '#4a90d9', emoji: '👤', style: 'male', bg: '#daeaf8' },
  { label: 'Jamie', color: '#7c5cbf', emoji: '👤', style: 'female', bg: '#ede0f8' },
  { label: 'Morgan', color: '#d97a4a', emoji: '👤', style: 'male', bg: '#f8e8da' },
  { label: 'Taylor', color: '#4a9f6e', emoji: '👤', style: 'female', bg: '#daecdf' },
  { label: 'Jordan', color: '#d4a044', emoji: '👤', style: 'male', bg: '#f8f0da' },
  { label: 'Casey', color: '#c44a6e', emoji: '👤', style: 'female', bg: '#f8dadf' },
  { label: 'Riley', color: '#4a7abf', emoji: '👤', style: 'male', bg: '#daebf8' },
  { label: 'Quinn', color: '#57a8a0', emoji: '👤', style: 'female', bg: '#d8f0ef' },
];

// Generate SVG avatar art (pure CSS/SVG, no external API)
function makeAvatarSVG(avatar, index) {
  const isFemale = avatar.style === 'female';
  const c = avatar.color;
  const bg = avatar.bg;
  // Simple stylized avatar SVG
  const hairLong = isFemale ? `
    <ellipse cx="50" cy="48" rx="28" ry="38" fill="${c}" opacity="0.9"/>
    <ellipse cx="50" cy="58" rx="26" ry="30" fill="${c}" opacity="0.85"/>
  ` : `
    <ellipse cx="50" cy="30" rx="22" ry="14" fill="${c}" opacity="0.9"/>
  `;
  const beard = !isFemale && index % 3 === 0 ? `<ellipse cx="50" cy="70" rx="12" ry="7" fill="${c}" opacity="0.6"/>` : '';
  const specs = (index % 3 === 1) ? `
    <rect x="34" y="50" width="11" height="8" rx="3" fill="none" stroke="#334" stroke-width="2" opacity="0.7"/>
    <rect x="48" y="50" width="11" height="8" rx="3" fill="none" stroke="#334" stroke-width="2" opacity="0.7"/>
    <line x1="45" y1="54" x2="48" y2="54" stroke="#334" stroke-width="1.5" opacity="0.7"/>
  ` : '';
  const blush = isFemale ? `
    <ellipse cx="37" cy="63" rx="5" ry="3.5" fill="#ffb8cc" opacity="0.55"/>
    <ellipse cx="63" cy="63" rx="5" ry="3.5" fill="#ffb8cc" opacity="0.55"/>
  ` : '';
  return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="${bg}"/>
  ${hairLong}
  <ellipse cx="50" cy="42" rx="20" ry="23" fill="#fdd8b0"/>
  ${beard}
  <ellipse cx="43" cy="41" rx="3" ry="3.5" fill="white"/>
  <ellipse cx="57" cy="41" rx="3" ry="3.5" fill="white"/>
  <circle cx="43" cy="41.5" r="2" fill="#2a3050"/>
  <circle cx="57" cy="41.5" r="2" fill="#2a3050"/>
  <circle cx="43.8" cy="40.8" r="0.7" fill="white"/>
  <circle cx="57.8" cy="40.8" r="0.7" fill="white"/>
  ${specs}
  ${blush}
  <path d="M43 56 Q50 62 57 56" stroke="#d98080" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <ellipse cx="50" cy="90" rx="26" ry="22" fill="${c}" opacity="0.75"/>
</svg>`)}`;
}

const AVATAR_LIST = AVATARS.map((a, i) => ({ ...a, src: makeAvatarSVG(a, i) }));

const COLORS = [
  '#000000','#ffffff','#f44336','#ff9800','#ffeb3b',
  '#4caf50','#2196f3','#9c27b0','#795548','#607d8b',
  '#e91e63','#00bcd4','#8bc34a','#ff5722','#3f51b5',
  '#009688','#cddc39','#ffc107','#673ab7','#03a9f4',
];

let state = {
  currentAvatarIndex: 0,
  playerName: '',
  totalRounds: 5,
  drawTime: 90,
  isMuted: false,

  // Game state
  players: [],
  currentWord: '',
  revealedIndices: [],
  currentDrawer: null,
  currentRound: 1,
  timerValue: 90,
  timerInterval: null,
  wordSelectTimerInterval: null,
  isDrawer: false,
  gameStarted: false,

  // Canvas
  isDrawing: false,
  currentTool: 'pencil',
  currentColor: '#000000',
  brushSize: 3,
  strokes: [], // for undo
  currentStroke: null,
  shapeStart: null,
  previewCanvas: null,

  // UI
  contextTarget: null,
  votes: {},
};

/* ----------------------------------------------------------
   LOBBY
   ---------------------------------------------------------- */
const lobbyScreen = document.getElementById('lobby-screen');
const gameScreen = document.getElementById('game-screen');
const avatarImg = document.getElementById('avatar-img');
const avatarFrame = document.getElementById('avatar-frame');
const avatarDotsEl = document.getElementById('avatar-dots');
const playerNameInput = document.getElementById('player-name');
const playBtn = document.getElementById('play-btn');

// Build avatar dots
function buildAvatarDots() {
  avatarDotsEl.innerHTML = '';
  AVATAR_LIST.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'avatar-dot' + (i === state.currentAvatarIndex ? ' active' : '');
    dot.addEventListener('click', () => setAvatar(i));
    avatarDotsEl.appendChild(dot);
  });
}

function setAvatar(index) {
  state.currentAvatarIndex = ((index % AVATAR_LIST.length) + AVATAR_LIST.length) % AVATAR_LIST.length;
  const av = AVATAR_LIST[state.currentAvatarIndex];
  // Fade transition
  avatarImg.style.opacity = '0';
  setTimeout(() => {
    avatarImg.src = av.src;
    avatarImg.alt = av.label;
    avatarImg.style.opacity = '1';
  }, 150);
  // Update dots
  document.querySelectorAll('.avatar-dot').forEach((d, i) => {
    d.classList.toggle('active', i === state.currentAvatarIndex);
  });
  // Glow frame briefly
  avatarFrame.classList.add('glow');
  setTimeout(() => avatarFrame.classList.remove('glow'), 700);
}

/* ----------------------------------------------------------
   CANVAS
   ---------------------------------------------------------- */
const canvas = document.getElementById('draw-canvas');
const ctx = canvas.getContext('2d');

function initCanvas() {
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // Mouse events
  canvas.addEventListener('mousedown', onDrawStart);
  canvas.addEventListener('mousemove', onDrawMove);
  canvas.addEventListener('mouseup', onDrawEnd);
  canvas.addEventListener('mouseleave', onDrawEnd);

  // Touch events — critical: prevent page scroll while drawing
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('touchend', onTouchEnd, { passive: false });
}

function resizeCanvas() {
  // Save current drawing
  const imageData = canvas.width > 0 ? ctx.getImageData(0, 0, canvas.width, canvas.height) : null;
  const wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  // Restore
  if (imageData) ctx.putImageData(imageData, 0, 0);
  // Set default styles
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

// Coordinate helpers
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
  };
}
function getTouchPos(e) {
  e.preventDefault(); // Prevent scroll!
  const touch = e.touches[0] || e.changedTouches[0];
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (touch.clientX - rect.left) * scaleX,
    y: (touch.clientY - rect.top) * scaleY,
  };
}

// Shape tools
function isShapeTool() { return ['line','rect','circle'].includes(state.currentTool); }

function drawShape(start, end, commit = false) {
  // For shape tools, we draw on a preview overlay
  if (commit) {
    // Commit preview to main canvas
    const tool = state.currentTool;
    ctx.strokeStyle = state.currentColor;
    ctx.lineWidth = state.brushSize;
    ctx.lineCap = 'round';
    ctx.beginPath();
    if (tool === 'line') {
      ctx.moveTo(start.x, start.y);
      ctx.lineTo(end.x, end.y);
      ctx.stroke();
    } else if (tool === 'rect') {
      ctx.strokeRect(start.x, start.y, end.x - start.x, end.y - start.y);
    } else if (tool === 'circle') {
      const rx = Math.abs(end.x - start.x) / 2;
      const ry = Math.abs(end.y - start.y) / 2;
      const cx = start.x + (end.x - start.x) / 2;
      const cy = start.y + (end.y - start.y) / 2;
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    saveStrokeSnapshot();
  }
}

// Flood fill (bucket tool)
function floodFill(x, y, fillColor) {
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  const xi = Math.round(x), yi = Math.round(y);
  const idx = (yi * canvas.width + xi) * 4;
  const targetR = data[idx], targetG = data[idx+1], targetB = data[idx+2], targetA = data[idx+3];

  // Parse fill color hex to RGBA
  const fc = hexToRgb(fillColor);
  if (!fc) return;
  if (targetR === fc.r && targetG === fc.g && targetB === fc.b) return;

  function matches(i) {
    return Math.abs(data[i]-targetR)<20 && Math.abs(data[i+1]-targetG)<20 &&
           Math.abs(data[i+2]-targetB)<20 && Math.abs(data[i+3]-targetA)<20;
  }
  const stack = [[xi, yi]];
  const visited = new Set();
  while (stack.length) {
    const [cx, cy] = stack.pop();
    if (cx < 0 || cx >= canvas.width || cy < 0 || cy >= canvas.height) continue;
    const ci = (cy * canvas.width + cx) * 4;
    const key = cy * canvas.width + cx;
    if (visited.has(key)) continue;
    if (!matches(ci)) continue;
    visited.add(key);
    data[ci] = fc.r; data[ci+1] = fc.g; data[ci+2] = fc.b; data[ci+3] = 255;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  ctx.putImageData(imageData, 0, 0);
  saveStrokeSnapshot();
}

function hexToRgb(hex) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r ? { r: parseInt(r[1],16), g: parseInt(r[2],16), b: parseInt(r[3],16) } : null;
}

// Draw stroke helpers
function startStroke(pos) {
  if (!state.isDrawer) return;
  state.isDrawing = true;
  if (isShapeTool()) {
    state.shapeStart = pos;
    state.previewSnapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
    return;
  }
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
  ctx.strokeStyle = state.currentTool === 'eraser' ? '#ffffff' : state.currentColor;
  ctx.lineWidth = state.currentTool === 'eraser' ? state.brushSize * 3 : state.brushSize;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

function continueStroke(pos) {
  if (!state.isDrawing || !state.isDrawer) return;
  if (isShapeTool()) {
    // Restore snapshot and draw preview
    ctx.putImageData(state.previewSnapshot, 0, 0);
    ctx.strokeStyle = state.currentColor;
    ctx.lineWidth = state.brushSize;
    ctx.lineCap = 'round';
    ctx.beginPath();
    const s = state.shapeStart, e = pos;
    if (state.currentTool === 'line') {
      ctx.moveTo(s.x, s.y); ctx.lineTo(e.x, e.y); ctx.stroke();
    } else if (state.currentTool === 'rect') {
      ctx.strokeRect(s.x, s.y, e.x - s.x, e.y - s.y);
    } else if (state.currentTool === 'circle') {
      const rx = Math.abs(e.x - s.x) / 2, ry = Math.abs(e.y - s.y) / 2;
      const cx = s.x + (e.x - s.x) / 2, cy = s.y + (e.y - s.y) / 2;
      ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2); ctx.stroke();
    }
    return;
  }
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
}

function endStroke(pos) {
  if (!state.isDrawer) return;
  if (isShapeTool() && state.isDrawing) {
    drawShape(state.shapeStart, pos, true);
    state.shapeStart = null;
  } else if (state.isDrawing) {
    ctx.closePath();
    saveStrokeSnapshot();
  }
  state.isDrawing = false;
}

function saveStrokeSnapshot() {
  // Keep a snapshot array for undo (limit to 30)
  state.strokes.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  if (state.strokes.length > 30) state.strokes.shift();
}

// Mouse handlers
function onDrawStart(e) {
  const pos = getPos(e);
  if (state.currentTool === 'fill') { floodFill(pos.x, pos.y, state.currentColor); return; }
  startStroke(pos);
}
function onDrawMove(e) { if (state.isDrawing) continueStroke(getPos(e)); }
function onDrawEnd(e) { endStroke(getPos(e)); }

// Touch handlers
function onTouchStart(e) {
  e.preventDefault();
  const pos = getTouchPos(e);
  if (state.currentTool === 'fill') { floodFill(pos.x, pos.y, state.currentColor); return; }
  startStroke(pos);
}
function onTouchMove(e) {
  e.preventDefault();
  if (state.isDrawing) continueStroke(getTouchPos(e));
}
function onTouchEnd(e) {
  e.preventDefault();
  endStroke(getTouchPos(e));
}

/* ----------------------------------------------------------
   TOOLBAR
   ---------------------------------------------------------- */
function setupToolbar() {
  const tools = ['pencil','brush','eraser','fill','line','rect','circle'];
  tools.forEach(t => {
    const btn = document.getElementById(`tool-${t}`);
    if (btn) btn.addEventListener('click', () => selectTool(t));
  });

  // Brush size dots
  document.querySelectorAll('.brush-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      state.brushSize = +dot.dataset.size;
      document.querySelectorAll('.brush-dot').forEach(d => d.classList.remove('active'));
      dot.classList.add('active');
    });
  });

  // Undo
  document.getElementById('tool-undo').addEventListener('click', () => {
    if (state.strokes.length > 1) {
      state.strokes.pop();
      ctx.putImageData(state.strokes[state.strokes.length - 1], 0, 0);
    } else if (state.strokes.length === 1) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      state.strokes = [];
    }
  });

  // Clear
  document.getElementById('tool-clear').addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    state.strokes = [];
  });
}

function selectTool(tool) {
  state.currentTool = tool;
  // Update cursor
  canvas.classList.toggle('eraser-mode', tool === 'eraser');
  // Update active button
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(`tool-${tool}`);
  if (btn) btn.classList.add('active');
}

/* ----------------------------------------------------------
   COLOR PALETTE
   ---------------------------------------------------------- */
function buildColorPalette() {
  const palette = document.getElementById('color-palette');
  palette.innerHTML = '';
  COLORS.forEach(color => {
    const swatch = document.createElement('div');
    swatch.className = 'color-swatch' + (color === state.currentColor ? ' active' : '');
    swatch.style.background = color;
    swatch.style.border = color === '#ffffff' ? '2px solid #ccc' : '';
    swatch.title = color;
    swatch.addEventListener('click', () => {
      state.currentColor = color;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      swatch.classList.add('active');
      // Auto-switch to pencil if eraser was active
      if (state.currentTool === 'eraser') selectTool('pencil');
    });
    palette.appendChild(swatch);
  });
}

/* ----------------------------------------------------------
   LEADERBOARD
   ---------------------------------------------------------- */
function buildLeaderboard() {
  const list = document.getElementById('leaderboard-list');
  list.innerHTML = '';
  const sorted = [...state.players].sort((a, b) => b.score - a.score);
  sorted.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'player-row' + (p.id === state.currentDrawer?.id ? ' drawing' : '');
    row.dataset.playerId = p.id;
    row.innerHTML = `
      <div class="player-rank">${i+1}</div>
      <div class="player-avatar-sm"><img src="${p.avatarSrc}" alt="${p.name}"/></div>
      <div class="player-info">
        <div class="player-name">${p.isSelf ? '⭐ '+p.name : p.name}</div>
        <div class="player-score">${p.score} pts</div>
      </div>
      ${p.id === state.currentDrawer?.id ? '<div class="player-drawing-badge">✏️</div>' : ''}
    `;
    if (!p.isSelf) {
      row.addEventListener('click', (e) => openContextMenu(e, p));
    }
    list.appendChild(row);
  });
}

/* ----------------------------------------------------------
   WORD SELECTION
   ---------------------------------------------------------- */
function showWordSelection() {
  const overlay = document.getElementById('word-select-overlay');
  overlay.classList.remove('hidden');

  // Pick 3 random words
  const shuffled = [...WORD_BANK].sort(() => Math.random() - 0.5).slice(0, 3);
  const cards = document.getElementById('word-cards');
  cards.innerHTML = '';
  shuffled.forEach(w => {
    const card = document.createElement('div');
    card.className = 'word-card glass-strong';
    card.innerHTML = `
      <div class="word-card-emoji">${w.emoji}</div>
      <div class="word-card-text">${w.word}</div>
      <div class="word-card-len">${w.word.length} letters</div>
    `;
    card.addEventListener('click', () => selectWord(w.word, overlay));
    cards.appendChild(card);
  });

  // 15-sec countdown
  let t = CONFIG.WORD_SELECT_TIME;
  const timerEl = document.getElementById('word-select-timer');
  const timeSpan = document.getElementById('word-select-time');
  timerEl.textContent = t;
  timeSpan.textContent = t;
  clearInterval(state.wordSelectTimerInterval);
  state.wordSelectTimerInterval = setInterval(() => {
    t--;
    timerEl.textContent = t;
    timeSpan.textContent = t;
    if (t <= 0) {
      clearInterval(state.wordSelectTimerInterval);
      // Auto-select first word
      selectWord(shuffled[0].word, overlay);
    }
  }, 1000);
}

function selectWord(word, overlay) {
  clearInterval(state.wordSelectTimerInterval);
  state.currentWord = word;
  state.revealedIndices = [];
  overlay.classList.add('hidden');
  renderWordBlanks();
  startRoundTimer();
  addChatMsg('system', '', `${state.currentDrawer.name} is now drawing! Start guessing!`);
}

/* ----------------------------------------------------------
   WORD BLANKS DISPLAY
   ---------------------------------------------------------- */
function renderWordBlanks() {
  const el = document.getElementById('word-blanks');
  const hint = document.getElementById('word-hint');
  el.innerHTML = '';
  if (state.isDrawer) {
    // Show full word to drawer
    const div = document.createElement('div');
    div.style.cssText = 'font-family:var(--font-display);font-size:1.1rem;color:var(--accent);letter-spacing:2px;';
    div.textContent = state.currentWord.toUpperCase();
    el.appendChild(div);
    hint.textContent = '(You are drawing)';
  } else {
    const word = state.currentWord;
    for (let i = 0; i < word.length; i++) {
      const blank = document.createElement('div');
      blank.className = 'word-blank';
      const char = document.createElement('div');
      char.className = 'word-blank-char';
      char.id = `blank-${i}`;
      char.textContent = state.revealedIndices.includes(i) ? word[i].toUpperCase() : (word[i] === ' ' ? ' ' : '');
      const line = document.createElement('div');
      line.className = 'word-blank-line';
      blank.appendChild(char);
      if (word[i] !== ' ') blank.appendChild(line);
      el.appendChild(blank);
    }
    hint.textContent = `${word.length} letters`;
  }
}

function revealHintLetter() {
  const word = state.currentWord;
  const unrevealed = word.split('').map((c, i) => i).filter(i => !state.revealedIndices.includes(i) && word[i] !== ' ');
  if (unrevealed.length <= 1) return;
  const randIdx = unrevealed[Math.floor(Math.random() * unrevealed.length)];
  state.revealedIndices.push(randIdx);
  renderWordBlanks();
  showToast('💡 A letter was revealed!', 'system');
}

/* ----------------------------------------------------------
   ROUND TIMER
   ---------------------------------------------------------- */
const CIRCUMFERENCE = 2 * Math.PI * 22; // r=22

function startRoundTimer() {
  state.timerValue = state.drawTime;
  clearInterval(state.timerInterval);
  updateTimerUI();

  // Schedule hint reveals
  const hintTimes = [Math.floor(state.drawTime * 0.6), Math.floor(state.drawTime * 0.3)];

  state.timerInterval = setInterval(() => {
    state.timerValue--;
    if (hintTimes.includes(state.timerValue) && !state.isDrawer) {
      revealHintLetter();
    }
    updateTimerUI();
    if (state.timerValue <= 0) {
      clearInterval(state.timerInterval);
      endRound();
    }
  }, 1000);
}

function updateTimerUI() {
  const numEl = document.getElementById('timer-num');
  const ringEl = document.getElementById('timer-ring-fg');
  const t = state.timerValue;
  const ratio = t / state.drawTime;
  numEl.textContent = t;
  ringEl.style.strokeDashoffset = CIRCUMFERENCE * (1 - ratio);
  const warn = t <= 30;
  numEl.className = 'timer-ring-num' + (warn ? ' warn' : '');
  ringEl.className = 'timer-ring-fg' + (warn ? ' warn' : '');
}

function updateRoundLabel() {
  document.getElementById('round-label').textContent = `Round ${state.currentRound} of ${state.totalRounds}`;
}

function endRound() {
  addChatMsg('system', '', `⏰ Time's up! The word was: "${state.currentWord}"`);
  // Simulate scores
  state.players.forEach(p => {
    if (p.id !== state.players[0].id) p.score += Math.floor(Math.random() * 80 + 20);
  });
  buildLeaderboard();

  // Advance round or end game
  state.currentRound++;
  if (state.currentRound > state.totalRounds) {
    endGame();
    return;
  }
  updateRoundLabel();

  // Clear canvas
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  state.strokes = [];

  setTimeout(() => showWordSelection(), 1500);
}

function endGame() {
  const winner = [...state.players].sort((a, b) => b.score - a.score)[0];
  addChatMsg('system', '', `🎉 Game Over! Winner: ${winner.name} with ${winner.score} pts!`);
  showToast(`🏆 ${winner.name} wins the game!`, 'system');
}

/* ----------------------------------------------------------
   CHAT
   ---------------------------------------------------------- */
function setupChat() {
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send');

  sendBtn.addEventListener('click', sendChatMsg);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendChatMsg(); });
}

function sendChatMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  // Check if correct guess
  const isCorrect = !state.isDrawer &&
    text.toLowerCase() === state.currentWord.toLowerCase() &&
    state.currentWord !== '';

  if (isCorrect) {
    addChatMsg('correct', state.playerName, '🎉 Guessed the word!');
    showToast(`✅ ${state.playerName} guessed it!`, 'correct');
    // Award points
    const pts = Math.max(10, Math.round(state.timerValue / state.drawTime * 100));
    const me = state.players.find(p => p.isSelf);
    if (me) me.score += pts;
    buildLeaderboard();
  } else {
    addChatMsg('normal', state.playerName, text);
  }
}

function addChatMsg(type, name, text) {
  const messages = document.getElementById('chat-messages');
  const msg = document.createElement('div');
  msg.className = 'chat-msg' + (type === 'correct' ? ' correct-msg' : '') + (type === 'system' ? ' system-msg' : '');
  if (type === 'system') {
    msg.innerHTML = `<span class="msg-text">${text}</span>`;
  } else {
    msg.innerHTML = `<span class="msg-name">${name}:</span> <span class="msg-text">${text}</span>`;
  }
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;

  // Simulate bot guesses occasionally
  if (type !== 'system' && Math.random() < 0.15) {
    setTimeout(() => simulateBotGuess(), 800 + Math.random() * 1500);
  }
}

function simulateBotGuess() {
  const bots = state.players.filter(p => !p.isSelf);
  const bot = bots[Math.floor(Math.random() * bots.length)];
  const guesses = ['is it a car?', 'monkey?', 'flower!', 'I have no idea lol', 'tree?', 'airplane?', 'house!'];
  const guess = guesses[Math.floor(Math.random() * guesses.length)];
  addChatMsg('normal', bot.name, guess);
}

/* ----------------------------------------------------------
   MUTE BUTTON
   ---------------------------------------------------------- */
function setupMuteBtn() {
  const btn = document.getElementById('mute-btn');
  btn.addEventListener('click', () => {
    state.isMuted = !state.isMuted;
    const icon = document.getElementById('mute-icon');
    icon.setAttribute('data-lucide', state.isMuted ? 'volume-x' : 'volume-2');
    lucide.createIcons();
    showToast(state.isMuted ? '🔇 Sound muted' : '🔊 Sound on', 'system');
  });
}

/* ----------------------------------------------------------
   TOAST NOTIFICATIONS
   ---------------------------------------------------------- */
function showToast(message, type = 'system') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `<span class="toast-icon">${type === 'correct' ? '✅' : 'ℹ️'}</span><span>${message}</span>`;
  container.prepend(toast);
  setTimeout(() => {
    toast.classList.add('fade-out');
    setTimeout(() => toast.remove(), 400);
  }, CONFIG.TOAST_DURATION);
}

/* ----------------------------------------------------------
   CONTEXT MENU (Player Actions)
   ---------------------------------------------------------- */
function setupContextMenu() {
  const menu = document.getElementById('context-menu');
  document.addEventListener('click', (e) => {
    if (!menu.contains(e.target)) menu.classList.add('hidden');
  });

  document.getElementById('ctx-kick').addEventListener('click', () => {
    if (!state.contextTarget) return;
    menu.classList.add('hidden');
    initiateVoteKick(state.contextTarget);
  });
  document.getElementById('ctx-mute').addEventListener('click', () => {
    if (!state.contextTarget) return;
    showToast(`🔇 ${state.contextTarget.name} muted`, 'system');
    menu.classList.add('hidden');
  });
  document.getElementById('ctx-report').addEventListener('click', () => {
    if (!state.contextTarget) return;
    showToast(`🚩 ${state.contextTarget.name} reported`, 'system');
    menu.classList.add('hidden');
  });
}

function openContextMenu(e, player) {
  e.stopPropagation();
  state.contextTarget = player;
  const menu = document.getElementById('context-menu');
  document.getElementById('ctx-name').textContent = player.name;
  document.getElementById('ctx-score').textContent = `${player.score} pts`;
  menu.classList.remove('hidden');

  // Position menu near click
  const x = Math.min(e.clientX, window.innerWidth - 180);
  const y = Math.min(e.clientY, window.innerHeight - 180);
  menu.style.left = x + 'px';
  menu.style.top = y + 'px';
  lucide.createIcons();
}

/* ----------------------------------------------------------
   VOTE TO KICK SYSTEM (70% majority required)
   ---------------------------------------------------------- */
function setupVoteBanner() {
  document.getElementById('vote-yes').addEventListener('click', () => {
    const banner = document.getElementById('vote-banner');
    banner.classList.add('hidden');
    const total = state.players.length;
    const needed = Math.ceil(total * 0.7);
    // Simulate 1 self vote + random bot votes
    const totalVotes = 1 + Math.floor(Math.random() * (total - 1));
    if (totalVotes >= needed) {
      const target = state.contextTarget;
      if (target) {
        state.players = state.players.filter(p => p.id !== target.id);
        buildLeaderboard();
        addChatMsg('system', '', `🚪 ${target.name} was kicked by vote.`);
      }
    } else {
      showToast('❌ Not enough votes to kick', 'system');
    }
  });
  document.getElementById('vote-no').addEventListener('click', () => {
    document.getElementById('vote-banner').classList.add('hidden');
    showToast('✅ Vote cancelled', 'system');
  });
}

function initiateVoteKick(player) {
  const banner = document.getElementById('vote-banner');
  const total = state.players.length;
  const needed = Math.ceil(total * 0.7);
  document.getElementById('vote-banner-title').textContent = `Vote to kick ${player.name}?`;
  document.getElementById('vote-banner-sub').textContent = `${needed} of ${total} votes needed (70%)`;
  banner.classList.remove('hidden');
  // Auto-hide after 10s
  setTimeout(() => banner.classList.add('hidden'), 10000);
}

/* ----------------------------------------------------------
   MOBILE LAYOUT ADJUSTMENT
   ---------------------------------------------------------- */
function adjustMobileLayout() {
  const isMobile = window.innerWidth < 768;
  const mainContent = document.getElementById('main-content');
  if (!isMobile) {
    // Desktop: leaderboard + canvas + chat in a row
    const lp = document.getElementById('leaderboard-panel');
    const cp = document.getElementById('chat-panel');
    if (!mainContent.contains(lp)) mainContent.insertBefore(lp, mainContent.firstChild);
    if (!mainContent.contains(cp)) mainContent.appendChild(cp);
    return;
  }
  // Mobile: canvas area on top, then 50/50 leaderboard/chat below
  const canvasArea = mainContent.querySelector('.canvas-area');
  const lp = document.getElementById('leaderboard-panel');
  const cp = document.getElementById('chat-panel');
  // Build bottom-panels wrapper if not present
  let bottomPanels = document.getElementById('bottom-panels');
  if (!bottomPanels) {
    bottomPanels = document.createElement('div');
    bottomPanels.id = 'bottom-panels';
    bottomPanels.style.cssText = 'display:flex;gap:6px;flex:1;min-height:0;overflow:hidden;';
  }
  // Rearrange DOM for mobile
  mainContent.style.flexDirection = 'column';
  if (!bottomPanels.contains(lp)) bottomPanels.appendChild(lp);
  if (!bottomPanels.contains(cp)) bottomPanels.appendChild(cp);
  if (!mainContent.contains(bottomPanels)) mainContent.appendChild(bottomPanels);
}

window.addEventListener('resize', adjustMobileLayout);

// Initial call after game inits
setTimeout(adjustMobileLayout, 100);

/* ----------------------------------------------------------
   RESPONSIVE: Re-init icons after any DOM updates
   ---------------------------------------------------------- */
const iconObserver = new MutationObserver(() => lucide.createIcons());
iconObserver.observe(document.body, { childList: true, subtree: true });

</script>
