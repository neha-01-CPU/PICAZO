<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picazo - The Ultimate Drawing Game</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* --- 1. DESIGN LANGUAGE (Icy Blue Glassmorphism) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background: radial-gradient(circle at top left, #ffffff 0%, #e0f2fe 50%, #bae6fd 100%); 
            height: 100dvh; width: 100vw; overflow: hidden; color: #0f172a; 
        }
        
        .hidden { display: none !important; }

        /* --- HIGH-PERFORMANCE ANIMATIONS --- */
        .zoom-fade-out { animation: zoomFadeOut 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; pointer-events: none; }
        @keyframes zoomFadeOut { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.3); opacity: 0; } }
        
        .fade-in { animation: fadeIn 0.8s ease forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; } }

        .timer-warning { color: #ef4444 !important; text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); transition: all 0.5s ease; }

        /* --- LOBBY SCREEN --- */
        #lobby-screen { position: absolute; height: 100%; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); 
            border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 24px; padding: 40px 30px; 
            width: 90%; max-width: 420px; display: flex; flex-direction: column; align-items: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); transition: transform 0.3s ease;
        }

        .logo-text { font-size: 2.8rem; color: #0284c7; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }
        .subtitle { font-size: 1rem; color: #64748b; margin-bottom: 30px; }

        .name-input { 
            width: 100%; padding: 16px; border: 2px solid rgba(255, 255, 255, 0.8); border-radius: 14px; 
            outline: none; text-align: center; font-size: 1.1rem; background: rgba(255,255,255,0.6); 
            margin-bottom: 25px; transition: all 0.3s; color: #0f172a; font-weight: 600;
        }
        .name-input:focus { border-color: #0ea5e9; background: white; box-shadow: 0 0 15px rgba(14, 165, 233, 0.2); }

        .avatar-label { font-weight: 600; margin-bottom: 15px; color: #334155; }
        .avatar-selector { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        
        /* Strict Square Frames for Avatars */
        .avatar-frame { 
            width: 120px; height: 120px; border-radius: 16px; 
            background: white; border: 3px solid #0ea5e9; 
            display: flex; justify-content: center; align-items: center; overflow: hidden; 
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.15);
        }
        #current-avatar { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.2s; }
        
        .arrow-btn { 
            background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.9); border-radius: 12px; 
            width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; 
            transition: all 0.2s; color: #0284c7;
        }
        .arrow-btn:hover { background: white; transform: scale(1.05); }

        .primary-btn { 
            width: 100%; padding: 18px; border-radius: 14px; border: none; 
            background: linear-gradient(135deg, #0ea5e9, #0284c7); color: white; 
            font-weight: 700; font-size: 1.1rem; cursor: pointer; margin-bottom: 12px; 
            box-shadow: 0 10px 20px rgba(2, 132, 199, 0.3); transition: all 0.2s;
        }
        .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(2, 132, 199, 0.4); }

        /* --- 2. LAYOUT ARCHITECTURE (Mobile First -> Desktop 3-Column) --- */
        #game-page { height: 100dvh; width: 100vw; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Glass Header */
        .game-header { 
            flex: 0 0 auto; height: 65px; 
            background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); 
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.9); 
            display: flex; justify-content: space-between; align-items: center; padding: 0 25px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
        .header-left { display: flex; flex-direction: column; align-items: flex-start; }
        .timer { font-size: 1.4rem; font-weight: 800; color: #0284c7; display: flex; align-items: center; gap: 8px; }
        .round-info { font-size: 0.75rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .word-blanks { font-size: 1.6rem; letter-spacing: 4px; font-weight: 800; color: #0f172a; }
        .mute-btn { background: none; border: none; color: #64748b; cursor: pointer; transition: transform 0.2s; }
        .mute-btn:hover { transform: scale(1.1); color: #0284c7; }

        /* Core Mobile Layout */
        .main-game-area { flex: 1; display: flex; flex-direction: column; gap: 15px; min-height: 0; }
        .canvas-container { 
            flex: 1.5; min-height: 0; background: white; border-radius: 20px; position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; display: flex; flex-direction: column; 
            border: 1px solid rgba(255,255,255,0.8);
        }
        canvas { flex: 1; width: 100%; cursor: crosshair; touch-action: none; }
        
        .bottom-split { flex: 1; min-height: 0; display: flex; gap: 15px; }
        .panel { 
            flex: 1; min-height: 0; background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); 
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.9); display: flex; flex-direction: column; padding: 15px; 
        }

        /* Desktop 3-Column Override */
        @media (min-width: 1024px) {
            .main-game-area { flex-direction: row; }
            .bottom-split { display: contents; } /* Breaks the flexbox so items act as grid/flex siblings */
            .panel { flex: 0 0 280px; } /* Fixed width for sidebars */
            .canvas-container { flex: 1; height: 100%; }
            #leaderboard-panel { order: 1; }
            .canvas-container { order: 2; }
            #chat-panel { order: 3; }
        }

        /* --- 3. SPECIFIC UI COMPONENTS --- */
        /* Glass Pill Toolbar */
        .toolbar { 
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            height: 55px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.9); border-radius: 30px; 
            display: flex; justify-content: center; align-items: center; gap: 10px; padding: 0 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 10;
        }
        .tool-btn { 
            background: none; border: none; color: #64748b; cursor: pointer; padding: 8px; 
            border-radius: 50%; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .tool-btn:hover { background: #f1f5f9; color: #0ea5e9; }
        .tool-btn.active { color: #0284c7; background: #e0f2fe; }
        .color-indicator { width: 20px; height: 20px; border-radius: 50%; background: black; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* Overlays (Word Cards & Waiting Screen) */
        .game-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.7); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20;
        }
        .word-cards-container { display: flex; gap: 15px; margin-top: 20px; }
        .word-card {
            background: rgba(255,255,255,0.9); border: 2px solid #0ea5e9; border-radius: 16px;
            padding: 20px 30px; font-size: 1.2rem; font-weight: bold; color: #0f172a; cursor: pointer;
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.15); transition: all 0.2s;
        }
        .word-card:hover { transform: translateY(-5px); background: #0ea5e9; color: white; }

        /* Toast Notifications */
        .toast-container { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 15; align-items: center; pointer-events: none; }
        .toast {
            background: rgba(34, 197, 94, 0.9); backdrop-filter: blur(10px); color: white;
            padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 0.9rem;
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);
            animation: slideUpFade 0.3s ease, fadeOut 0.5s ease 4.5s forwards; /* Fades out after 5s */
        }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* Moderation Menu */
        .mod-menu { position: absolute; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; overflow: hidden; z-index: 100; display: flex; flex-direction: column; min-width: 120px; }
        .mod-btn { padding: 12px 15px; background: none; border: none; text-align: left; font-size: 0.9rem; cursor: pointer; transition: background 0.2s; color: #334155; display: flex; align-items: center; gap: 8px; }
        .mod-btn:hover { background: #f8fafc; color: #0284c7; }
        .mod-btn.kick { color: #ef4444; }

        /* Panels (Leaderboard/Chat) */
        h3 { flex: 0 0 auto; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; color: #64748b; text-align: center; }
        
        .player-list { flex: 1; overflow-y: auto; list-style: none; }
        .player-item { display: flex; align-items: center; gap: 12px; padding: 8px; background: rgba(255,255,255,0.7); border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: background 0.2s; border: 1px solid transparent; }
        .player-item.drawing { border-color: #0ea5e9; background: white; box-shadow: 0 4px 10px rgba(14, 165, 233, 0.1); }
        .player-item img { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; }
        .player-info { display: flex; flex-direction: column; }
        .p-name { font-size: 0.9rem; font-weight: 700; color: #0f172a; }
        .p-score { font-size: 0.8rem; color: #64748b; }

        .chat-history { flex: 1; overflow-y: auto; font-size: 0.9rem; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        .chat-msg { padding: 8px 12px; background: rgba(255,255,255,0.8); border-radius: 12px; word-wrap: break-word; color: #334155; }
        .chat-system { color: #0284c7; font-weight: bold; background: none; font-size: 0.85rem; }
        
        .chat-form { flex: 0 0 auto; display: flex; gap: 8px; width: 100%; }
        .chat-input { flex: 1; padding: 12px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.8); background: rgba(255,255,255,0.7); outline: none; font-size: 0.95rem; transition: all 0.3s; }
        .chat-input:focus { background: white; border-color: #0ea5e9; }
        .chat-send-btn { background: #0ea5e9; color: white; border: none; border-radius: 14px; padding: 0 15px; cursor: pointer; transition: background 0.2s; }
        .chat-send-btn:hover { background: #0284c7; }

        /* Popups (Colors/Sizes) */
        .popup-menu { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.8); box-shadow: 0 15px 35px rgba(0,0,0,0.1); z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .color-swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s; }
        .color-swatch.active { border: 2px solid #0f172a; transform: scale(1.15); }
    </style>
</head>
<body>

    <div id="lobby-screen">
        <div class="glass-card">
            <h1 class="logo-text">Picazo</h1>
            <p class="subtitle">The Premium Drawing Experience</p>
            <input type="text" id="player-name" class="name-input" placeholder="Enter your name" autocomplete="off" maxlength="15">
            
            <p class="avatar-label">Choose your avatar</p>
            <div class="avatar-selector">
                <button id="prev-avatar" class="arrow-btn"><i data-lucide="chevron-left"></i></button>
                <div class="avatar-frame"><img id="current-avatar" src="" alt="Avatar"></div>
                <button id="next-avatar" class="arrow-btn"><i data-lucide="chevron-right"></i></button>
            </div>
            
            <button id="play-btn" class="primary-btn">PLAY NOW</button>
        </div>
    </div>

    <div id="game-page" class="hidden">
        
        <div class="game-header fade-in">
            <div class="header-left">
                <div class="timer" id="game-timer"><i data-lucide="clock" size="20"></i> <span id="timer-text">60</span></div>
                <div class="round-info">Round 1 of 5</div>
            </div>
            <div class="word-blanks">_ _ _ _ _ <span style="font-size: 0.9rem; color: #94a3b8;">(5)</span></div>
            <button class="mute-btn"><i data-lucide="volume-2" size="22"></i></button>
        </div>

        <div class="main-game-area fade-in" style="animation-delay: 0.1s;">
            
            <div class="panel" id="leaderboard-panel">
                <h3>Leaderboard</h3>
                <ul class="player-list">
                    <li class="player-item drawing" onclick="toggleModMenu(event)">
                        <img id="in-game-avatar" src="" alt="Player">
                        <div class="player-info">
                            <span class="p-name" id="in-game-name">You</span>
                            <span class="p-score">0 pts</span>
                        </div>
                        <i data-lucide="pencil" size="14" style="color: #0ea5e9; margin-left: auto;"></i>
                    </li>
                </ul>
            </div>

            <div class="canvas-container">
                <canvas id="drawingBoard"></canvas>
                
                <div class="toast-container" id="toast-container"></div>

                <div id="overlay-waiting" class="game-overlay hidden">
                    <h2 style="color: #0284c7; margin-bottom: 10px;">Waiting for players...</h2>
                    <i data-lucide="loader-2" size="30" style="color: #0ea5e9; animation: spin 2s linear infinite;"></i>
                </div>
                
                <div id="overlay-words" class="game-overlay hidden">
                    <h2 style="color: #0f172a;">Choose a Word</h2>
                    <p style="color: #ef4444; font-weight: bold; font-size: 1.2rem; margin: 10px 0;">15s</p>
                    <div class="word-cards-container">
                        <button class="word-card" onclick="hideOverlay()">Apple</button>
                        <button class="word-card" onclick="hideOverlay()">Guitar</button>
                        <button class="word-card" onclick="hideOverlay()">Tornado</button>
                    </div>
                </div>

                <div id="color-popup" class="popup-menu hidden">
                    <div class="color-grid" id="color-grid"></div>
                    <input type="color" id="native-color" style="width:100%; margin-top:5px; height:30px; cursor:pointer; border:none; border-radius:5px;">
                </div>
                <div id="size-popup" class="popup-menu hidden">
                    <label style="font-size:0.8rem; font-weight:bold; color:#64748b; text-align:center; display:block; margin-bottom:5px;">Size: <span id="size-label">3</span>px</label>
                    <input type="range" id="tool-size" style="width: 150px; accent-color: #0ea5e9;" min="1" max="30" value="3">
                </div>

                <div class="toolbar">
                    <button id="tool-pencil" class="tool-btn active"><i data-lucide="pencil" size="20"></i></button>
                    <button id="tool-color-btn" class="tool-btn"><div id="color-indicator" class="color-indicator"></div></button>
                    <button id="tool-size-btn" class="tool-btn"><i data-lucide="circle-dot" size="20"></i></button>
                    <button id="tool-shape" class="tool-btn"><i data-lucide="square" size="20"></i></button>
                    <button id="tool-fill" class="tool-btn"><i data-lucide="paint-bucket" size="20"></i></button>
                    <button id="tool-eraser" class="tool-btn"><i data-lucide="eraser" size="20"></i></button>
                    <button id="tool-undo" class="tool-btn"><i data-lucide="undo-2" size="20"></i></button>
                    <button id="tool-trash" class="tool-btn"><i data-lucide="trash-2" size="20"></i></button>
                </div>
            </div>

            <div class="panel" id="chat-panel">
                <h3>Chat</h3>
                <div class="chat-history" id="chat-box">
                    <span class="chat-msg chat-system">System: Welcome to Picazo!</span>
                </div>
                <form id="chat-form" class="chat-form">
                    <input type="text" id="chat-input" class="chat-input" placeholder="Type your guess..." autocomplete="off">
                    <button type="submit" class="chat-send-btn"><i data-lucide="send" size="16"></i></button>
                </form>
            </div>
            
        </div>
    </div>

    <div id="mod-menu" class="mod-menu hidden">
        <button class="mod-btn" onclick="closeModMenu()"><i data-lucide="user-x" size="16"></i> Mute Player</button>
        <button class="mod-btn" onclick="closeModMenu()"><i data-lucide="flag" size="16"></i> Report</button>
        <button class="mod-btn kick" onclick="closeModMenu()"><i data-lucide="gavel" size="16"></i> Vote Kick</button>
    </div>

    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>

    <script>
        lucide.createIcons();

        // --- 1. REALISTIC LOCAL AVATARS (Simulated via Unsplash for HD Realism) ---
        const avatars = [
            "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=250&h=250&fit=crop", // Male, short hair
            "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=250&h=250&fit=crop", // Female, long hair
            "https://images.unsplash.com/photo-1599566150163-29194dcaad36?w=250&h=250&fit=crop", // Male, spectacles
            "https://images.unsplash.com/photo-1580489944761-15a19d654956?w=250&h=250&fit=crop", // Female, subtle blush
            "https://images.unsplash.com/photo-1527980965255-d3b416303d12?w=250&h=250&fit=crop"  // Male, beard
        ];
        let avatarIndex = 0;
        document.getElementById('current-avatar').src = avatars[avatarIndex];
        
        document.getElementById('next-avatar').addEventListener('click', () => { avatarIndex = (avatarIndex + 1) % avatars.length; document.getElementById('current-avatar').src = avatars[avatarIndex]; });
        document.getElementById('prev-avatar').addEventListener('click', () => { avatarIndex = (avatarIndex - 1 + avatars.length) % avatars.length; document.getElementById('current-avatar').src = avatars[avatarIndex]; });

        // --- 2. THE ZOOM-AND-FADE TRANSITION ---
        document.getElementById('play-btn').addEventListener('click', () => {
            const name = document.getElementById('player-name').value.trim();
            if (name === "") return alert("Please enter a name!");
            
            document.getElementById('in-game-name').textContent = name;
            document.getElementById('in-game-avatar').src = avatars[avatarIndex];
            
            // Trigger animation
            const lobby = document.getElementById('lobby-screen');
            lobby.classList.add('zoom-fade-out');
            
            setTimeout(() => {
                lobby.classList.add('hidden');
                document.getElementById('game-page').classList.remove('hidden');
                setTimeout(initCanvas, 100);
                
                // Simulate showing Word Cards for demonstration
                document.getElementById('overlay-words').classList.remove('hidden');
            }, 600); // Wait for animation to finish
        });

        function hideOverlay() {
            document.getElementById('overlay-words').classList.add('hidden');
            startTimer(); // Start round timer
        }

        // --- 3. RED GLOW TIMER ANIMATION ---
        let timeLeft = 60;
        function startTimer() {
            const timerContainer = document.getElementById('game-timer');
            const timerText = document.getElementById('timer-text');
            setInterval(() => {
                timeLeft--;
                if(timeLeft < 0) timeLeft = 0;
                timerText.textContent = timeLeft;
                if(timeLeft <= 30) { timerContainer.classList.add('timer-warning'); }
            }, 1000);
        }

        // --- 4. TOAST NOTIFICATIONS & MODERATION MENU ---
        function showToast(guesserName) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = `${guesserName} guessed the word!`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function toggleModMenu(e) {
            const menu = document.getElementById('mod-menu');
            menu.classList.remove('hidden');
            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
        }
        function closeModMenu() { document.getElementById('mod-menu').classList.add('hidden'); }
        document.addEventListener('click', (e) => { if(!e.target.closest('.player-item')) closeModMenu(); });

        // --- 5. THE DRAWING ENGINE (Includes Flood Fill) ---
        const canvas = document.getElementById('drawingBoard');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let isDrawing = false, isErasing = false, isFilling = false, isShape = false, drawingHistory = [];
        let currentColor = '#000000', currentBrushSize = 3;

        function initCanvas() {
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight - 55; 
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height); saveState();
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            if (e.touches) return { x: Math.floor(e.touches[0].clientX - rect.left), y: Math.floor(e.touches[0].clientY - rect.top) };
            return { x: Math.floor(e.clientX - rect.left), y: Math.floor(e.clientY - rect.top) };
        }

        function startAction(e) {
            const pos = getPos(e);
            if (isFilling) { smartFloodFill(pos.x, pos.y, currentColor); return; }
            if (isShape) { alert("Shape tool selected! (Logic to drag-and-draw shapes goes here)"); return; }

            isDrawing = true; ctx.beginPath(); ctx.moveTo(pos.x, pos.y); draw(e); 
        }

        function endAction() { if (isDrawing) { isDrawing = false; ctx.closePath(); saveState(); } }
        
        function draw(e) {
            if (!isDrawing || isFilling || isShape) return;
            e.preventDefault(); 
            ctx.lineWidth = currentBrushSize; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.strokeStyle = isErasing ? "white" : currentColor;
            ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke();
        }

        canvas.addEventListener('mousedown', startAction); canvas.addEventListener('mouseup', endAction);
        canvas.addEventListener('mousemove', draw); canvas.addEventListener('mouseout', endAction);
        canvas.addEventListener('touchstart', startAction, {passive: false}); canvas.addEventListener('touchend', endAction); canvas.addEventListener('touchmove', draw, {passive: false});

        // Smart Flood Fill Algorithm
        function hexToRgba(hex) { let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); return {r, g, b, a: 255}; }
        function smartFloodFill(startX, startY, fillHex) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height); const data = imageData.data; const w = canvas.width, h = canvas.height;
            const startPos = (startY * w + startX) * 4; const startR = data[startPos], startG = data[startPos + 1], startB = data[startPos + 2];
            const fill = hexToRgba(fillHex);
            if (startR === fill.r && startG === fill.g && startB === fill.b) return;
            const stack = [[startX, startY]];
            while (stack.length > 0) {
                let [x, y] = stack.pop(); let pos = (y * w + x) * 4;
                while (y >= 0 && matchColor(pos)) { y--; pos -= w * 4; }
                pos += w * 4; y++; let reachLeft = false, reachRight = false;
                while (y < h && matchColor(pos)) {
                    data[pos] = fill.r; data[pos+1] = fill.g; data[pos+2] = fill.b; data[pos+3] = 255; 
                    if (x > 0) { if (matchColor(pos - 4)) { if (!reachLeft) { stack.push([x - 1, y]); reachLeft = true; } } else if (reachLeft) { reachLeft = false; } }
                    if (x < w - 1) { if (matchColor(pos + 4)) { if (!reachRight) { stack.push([x + 1, y]); reachRight = true; } } else if (reachRight) { reachRight = false; } }
                    y++; pos += w * 4;
                }
            }
            ctx.putImageData(imageData, 0, 0); saveState();
            function matchColor(p) { return data[p] === startR && data[p+1] === startG && data[p+2] === startB; }
        }

        // Toolbar Logic
        const btnColor = document.getElementById('tool-color-btn'), popupColor = document.getElementById('color-popup');
        const btnSize = document.getElementById('tool-size-btn'), popupSize = document.getElementById('size-popup');
        
        btnColor.addEventListener('click', () => { popupColor.classList.toggle('hidden'); popupSize.classList.add('hidden'); });
        btnSize.addEventListener('click', () => { popupSize.classList.toggle('hidden'); popupColor.classList.add('hidden'); });
        canvas.addEventListener('touchstart', () => { popupColor.classList.add('hidden'); popupSize.classList.add('hidden'); });

        const palette = ['#000000', '#ffffff', '#ef4444', '#3b82f6', '#22c55e', '#eab308', '#a855f7', '#f97316', '#ec4899', '#06b6d4', '#84cc16', '#8b5cf6'];
        const grid = document.getElementById('color-grid');
        palette.forEach(col => {
            let div = document.createElement('div'); div.className = 'color-swatch'; div.style.backgroundColor = col; if(col === '#000000') div.classList.add('active');
            div.addEventListener('click', () => {
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                div.classList.add('active'); currentColor = col; document.getElementById('color-indicator').style.backgroundColor = col;
                setTool('tool-pencil'); popupColor.classList.add('hidden');
            }); grid.appendChild(div);
        });

        document.getElementById('native-color').addEventListener('input', (e) => { currentColor = e.target.value; document.getElementById('color-indicator').style.backgroundColor = e.target.value; setTool('tool-pencil'); });
        document.getElementById('tool-size').addEventListener('input', (e) => { currentBrushSize = e.target.value; document.getElementById('size-label').textContent = currentBrushSize; });

        function setTool(id) {
            isErasing = (id === 'tool-eraser'); isFilling = (id === 'tool-fill'); isShape = (id === 'tool-shape');
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        document.getElementById('tool-pencil').addEventListener('click', () => setTool('tool-pencil'));
        document.getElementById('tool-eraser').addEventListener('click', () => setTool('tool-eraser'));
        document.getElementById('tool-fill').addEventListener('click', () => setTool('tool-fill'));
        document.getElementById('tool-shape').addEventListener('click', () => setTool('tool-shape'));
        document.getElementById('tool-trash').addEventListener('click', () => { ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height); saveState(); setTool('tool-pencil'); });

        function saveState() { drawingHistory.push(canvas.toDataURL()); if (drawingHistory.length > 15) drawingHistory.shift(); }
        document.getElementById('tool-undo').addEventListener('click', () => {
            if (drawingHistory.length > 1) {
                drawingHistory.pop(); const img = new Image(); img.src = drawingHistory[drawingHistory.length - 1];
                img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); };
            }
        });

        // Chat & Toast Simulator
        document.getElementById('chat-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const msgText = document.getElementById('chat-input').value.trim();
            if (msgText !== '') {
                const name = document.getElementById('in-game-name').textContent;
                
                // Simulate a "Correct Guess" triggering the Toast
                if(msgText.toLowerCase() === "apple") {
                    showToast(name); // Pops up the green toast!
                } else {
                    const msgSpan = document.createElement('span'); msgSpan.className = 'chat-msg';
                    msgSpan.innerHTML = `<strong>${name}:</strong> ${msgText}`;
                    document.getElementById('chat-box').appendChild(msgSpan);
                }
                
                document.getElementById('chat-input').value = ''; document.getElementById('chat-input').blur(); 
                document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
            }
        });
    </script>
</body>
