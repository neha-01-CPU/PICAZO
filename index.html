<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picazo - The Premium Drawing Game</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* --- 1. DESIGN LANGUAGE: TWILIGHT GLASSMORPHISM --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            /* A stunning, premium sunset/twilight gradient */
            background: linear-gradient(135deg, #1e1b4b 0%, #701a75 50%, #ea580c 100%);
            height: 100dvh; width: 100vw; overflow: hidden; color: #f8fafc; 
        }
        
        .hidden { display: none !important; }

        /* Glass Panel Base */
        .glass-panel {
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* --- LOBBY SCREEN --- */
        #lobby-screen { position: absolute; height: 100%; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 50; }
        
        .lobby-card { 
            border-radius: 24px; padding: 40px 30px; width: 90%; max-width: 400px; 
            display: flex; flex-direction: column; align-items: center; 
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-text { font-size: 3rem; color: #fff; font-weight: 800; letter-spacing: 2px; margin-bottom: 5px; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .subtitle { font-size: 0.95rem; color: #cbd5e1; margin-bottom: 30px; letter-spacing: 1px; }

        .name-input { 
            width: 100%; padding: 16px; border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 14px; 
            outline: none; text-align: center; font-size: 1.1rem; background: rgba(0,0,0,0.2); 
            margin-bottom: 25px; color: white; transition: all 0.3s;
        }
        .name-input::placeholder { color: #94a3b8; }
        .name-input:focus { border-color: #f97316; background: rgba(0,0,0,0.4); }

        .avatar-label { font-weight: 600; margin-bottom: 15px; color: #e2e8f0; }
        .avatar-selector { display: flex; align-items: center; justify-content: center; gap: 25px; margin-bottom: 30px; }
        
        .avatar-frame { 
            width: 120px; height: 120px; border-radius: 20px; 
            background: rgba(255,255,255,0.9); border: 3px solid #f97316; 
            display: flex; justify-content: center; align-items: center; overflow: hidden; 
            box-shadow: 0 0 20px rgba(249, 115, 22, 0.4);
        }
        #current-avatar { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.2s; }
        
        .arrow-btn { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; 
            width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; 
            color: white; transition: all 0.2s;
        }
        .arrow-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.1); }

        .primary-btn { 
            width: 100%; padding: 18px; border-radius: 14px; border: none; 
            background: linear-gradient(90deg, #db2777, #f97316); color: white; 
            font-weight: 800; font-size: 1.1rem; cursor: pointer; letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(219, 39, 119, 0.4); transition: transform 0.1s;
        }
        .primary-btn:active { transform: scale(0.97); }

        .zoom-out-fade { transform: scale(1.2); opacity: 0; pointer-events: none; }

        /* --- 2. GAME LAYOUT (Mobile First -> Desktop 3-Column) --- */
        #game-page { height: 100dvh; width: 100vw; padding: 10px; display: flex; flex-direction: column; gap: 10px; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Header */
        .game-header { 
            flex: 0 0 auto; height: 65px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px; 
        }
        .header-left { display: flex; flex-direction: column; }
        .timer { font-size: 1.5rem; font-weight: 800; color: #fde047; display: flex; align-items: center; gap: 6px; transition: color 0.3s; }
        .timer.warning { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.8); }
        .round-info { font-size: 0.75rem; color: #cbd5e1; text-transform: uppercase; letter-spacing: 1px; }
        .word-blanks { font-size: 1.8rem; letter-spacing: 5px; font-weight: 800; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .mute-btn { background: none; border: none; color: white; cursor: pointer; }

        /* Main Area */
        .main-game-area { flex: 1; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        
        .canvas-container { 
            flex: 1.5; min-height: 0; background: white; border-radius: 20px; position: relative; 
            overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas { flex: 1; width: 100%; cursor: crosshair; touch-action: none; }

        .bottom-split { flex: 1; min-height: 0; display: flex; gap: 10px; }
        .panel { flex: 1; min-height: 0; border-radius: 20px; display: flex; flex-direction: column; padding: 12px; }

        /* Desktop Override */
        @media (min-width: 1024px) {
            .main-game-area { flex-direction: row; padding: 0 20px 20px 20px; }
            .bottom-split { display: contents; }
            .panel { flex: 0 0 280px; } 
            .canvas-container { flex: 1; height: 100%; }
            #leaderboard-panel { order: 1; }
            .canvas-container { order: 2; }
            #chat-panel { order: 3; }
        }

        /* --- 3. UI COMPONENTS --- */
        /* Toolbar */
        .toolbar { 
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            height: 55px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; 
            display: flex; justify-content: center; align-items: center; gap: 10px; padding: 0 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 10;
        }
        .tool-btn { background: none; border: none; color: #94a3b8; cursor: pointer; padding: 8px; border-radius: 50%; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .tool-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        .tool-btn.active { color: #f97316; background: rgba(249, 115, 22, 0.15); }
        .color-indicator { width: 22px; height: 22px; border-radius: 50%; background: black; border: 2px solid white; }

        /* Overlays & Popups */
        .game-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; color: white; }
        .word-cards-container { display: flex; gap: 15px; margin-top: 20px; }
        .word-card { background: rgba(255,255,255,0.1); border: 2px solid #db2777; border-radius: 16px; padding: 20px 30px; font-size: 1.2rem; font-weight: bold; color: white; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.2s; }
        .word-card:hover { background: #db2777; transform: translateY(-5px); }

        .popup-menu { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.2); z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .color-swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-swatch.active { border: 2px solid white; transform: scale(1.15); }

        /* Toast Notifications (Strictly Floating, no boxes) */
        .toast-container { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 15; align-items: center; pointer-events: none; width: 100%; }
        .toast {
            background: linear-gradient(90deg, #16a34a, #22c55e); color: white;
            padding: 10px 25px; border-radius: 30px; font-weight: bold; font-size: 0.95rem;
            box-shadow: 0 5px 15px rgba(22, 163, 74, 0.4); border: 1px solid rgba(255,255,255,0.4);
            animation: slideUp 0.3s ease, fadeOut 0.5s ease 4.5s forwards; 
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* Leaderboard & Chat Panels */
        .panel h3 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; color: #cbd5e1; text-align: center; }
        
        .player-list { flex: 1; overflow-y: auto; list-style: none; }
        .player-item { display: flex; align-items: center; gap: 10px; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 8px; cursor: pointer; border: 1px solid transparent; }
        .player-item.drawing { border-color: #f97316; background: rgba(249, 115, 22, 0.1); }
        .player-item img { width: 40px; height: 40px; border-radius: 10px; object-fit: cover; background: white; }
        .player-info { display: flex; flex-direction: column; }
        .p-name { font-size: 0.9rem; font-weight: 700; color: white; }
        .p-score { font-size: 0.8rem; color: #94a3b8; }

        .chat-history { flex: 1; overflow-y: auto; font-size: 0.9rem; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; padding-right: 5px; }
        .chat-msg { padding: 8px 12px; background: rgba(255,255,255,0.1); border-radius: 12px; word-wrap: break-word; color: white; }
        .chat-system { color: #fde047; font-weight: bold; background: none; padding: 4px; font-style: italic; }
        
        .chat-form { flex: 0 0 auto; display: flex; gap: 8px; width: 100%; }
        .chat-input { flex: 1; padding: 12px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); outline: none; color: white; font-size: 0.95rem; }
        .chat-input::placeholder { color: #94a3b8; }
        .chat-input:focus { border-color: #db2777; background: rgba(0,0,0,0.5); }
        .chat-send-btn { background: #db2777; color: white; border: none; border-radius: 14px; padding: 0 15px; cursor: pointer; }

        /* Moderation Menu */
        .mod-menu { position: absolute; background: #1e293b; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.5); overflow: hidden; z-index: 100; display: flex; flex-direction: column; min-width: 130px; }
        .mod-btn { padding: 12px 15px; background: none; border: none; text-align: left; font-size: 0.9rem; cursor: pointer; color: white; display: flex; align-items: center; gap: 8px; }
        .mod-btn:hover { background: #334155; }
        .mod-btn.kick { color: #ef4444; }
    </style>
</head>
<body>

    <div id="lobby-screen">
        <div class="glass-panel lobby-card">
            <h1 class="logo-text">PICAZO</h1>
            <p class="subtitle">The Premium Drawing Experience</p>
            <input type="text" id="player-name" class="name-input" placeholder="Type your name..." autocomplete="off" maxlength="15">
            
            <p class="avatar-label">Choose your avatar</p>
            <div class="avatar-selector">
                <button id="prev-avatar" class="arrow-btn"><i data-lucide="chevron-left"></i></button>
                <div class="avatar-frame"><img id="current-avatar" src="" alt="Avatar"></div>
                <button id="next-avatar" class="arrow-btn"><i data-lucide="chevron-right"></i></button>
            </div>
            <button id="play-btn" class="primary-btn">PLAY NOW</button>
        </div>
    </div>

    <div id="game-page" class="hidden">
        <div class="game-header glass-panel">
            <div class="header-left">
                <div class="timer" id="game-timer"><i data-lucide="clock" size="22"></i> <span id="timer-text">60</span></div>
                <div class="round-info">Round 1 of 5</div>
            </div>
            <div class="word-blanks">_ _ _ _ _ <span style="font-size: 1rem; color: #cbd5e1; font-weight: normal;">(5)</span></div>
            <button class="mute-btn"><i data-lucide="volume-2" size="24"></i></button>
        </div>

        <div class="main-game-area">
            <div class="panel glass-panel" id="leaderboard-panel">
                <h3>Leaderboard</h3>
                <ul class="player-list">
                    <li class="player-item drawing" onclick="toggleModMenu(event)">
                        <img id="in-game-avatar" src="" alt="Player">
                        <div class="player-info">
                            <span class="p-name" id="in-game-name">You</span>
                            <span class="p-score">0 pts</span>
                        </div>
                        <i data-lucide="pencil" size="16" style="color: #f97316; margin-left: auto;"></i>
                    </li>
                </ul>
            </div>

            <div class="canvas-container">
                <canvas id="drawingBoard"></canvas>
                
                <div class="toast-container" id="toast-container"></div>

                <div id="overlay-waiting" class="game-overlay hidden">
                    <h2 style="margin-bottom: 10px;">Waiting for players...</h2>
                    <i data-lucide="loader-2" size="32" style="animation: spin 2s linear infinite;"></i>
                </div>
                
                <div id="overlay-words" class="game-overlay hidden">
                    <h2>Choose a Word</h2>
                    <p style="color: #fde047; font-weight: bold; font-size: 1.5rem; margin: 15px 0;">15s</p>
                    <div class="word-cards-container">
                        <button class="word-card" onclick="hideOverlay()">Apple</button>
                        <button class="word-card" onclick="hideOverlay()">Guitar</button>
                        <button class="word-card" onclick="hideOverlay()">Tornado</button>
                    </div>
                </div>

                <div id="color-popup" class="popup-menu hidden">
                    <div class="color-grid" id="color-grid"></div>
                    <input type="color" id="native-color" style="width:100%; margin-top:5px; height:30px; cursor:pointer; border:none; border-radius:5px;">
                </div>
                <div id="size-popup" class="popup-menu hidden">
                    <label style="font-size:0.8rem; font-weight:bold; color:white; text-align:center; display:block; margin-bottom:5px;">Size: <span id="size-label">3</span>px</label>
                    <input type="range" id="tool-size" style="width: 150px; accent-color: #f97316;" min="1" max="30" value="3">
                </div>

                <div class="toolbar">
                    <button id="tool-pencil" class="tool-btn active"><i data-lucide="pencil" size="20"></i></button>
                    <button id="tool-color-btn" class="tool-btn"><div id="color-indicator" class="color-indicator"></div></button>
                    <button id="tool-size-btn" class="tool-btn"><i data-lucide="circle-dot" size="20"></i></button>
                    <button id="tool-shape" class="tool-btn"><i data-lucide="square" size="20"></i></button>
                    <button id="tool-fill" class="tool-btn"><i data-lucide="paint-bucket" size="20"></i></button>
                    <button id="tool-eraser" class="tool-btn"><i data-lucide="eraser" size="20"></i></button>
                    <button id="tool-undo" class="tool-btn"><i data-lucide="undo-2" size="20"></i></button>
                    <button id="tool-trash" class="tool-btn"><i data-lucide="trash-2" size="20"></i></button>
                </div>
            </div>

            <div class="panel glass-panel" id="chat-panel">
                <h3>Chat</h3>
                <div class="chat-history" id="chat-box">
                    <span class="chat-system">System: Welcome to Picazo!</span>
                </div>
                <form id="chat-form" class="chat-form">
                    <input type="text" id="chat-input" class="chat-input" placeholder="Type your guess..." autocomplete="off">
                    <button type="submit" class="chat-send-btn"><i data-lucide="send" size="18"></i></button>
                </form>
            </div>
        </div>
    </div>

    <div id="mod-menu" class="mod-menu hidden">
        <button class="mod-btn" onclick="closeModMenu()"><i data-lucide="user-x" size="16"></i> Mute</button>
        <button class="mod-btn" onclick="closeModMenu()"><i data-lucide="flag" size="16"></i> Report</button>
        <button class="mod-btn kick" onclick="closeModMenu()"><i data-lucide="gavel" size="16"></i> Vote Kick</button>
    </div>

    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>

    <script>
        lucide.createIcons();

        // 1. ORIGINAL PREMIUM AVATARS (Dicebear Animated/Abstract from V4)
        const avatars = [
            "https://api.dicebear.com/7.x/micah/svg?seed=P1&backgroundColor=b6e3f4", "https://api.dicebear.com/7.x/shapes/svg?seed=P2&backgroundColor=c0aede",
            "https://api.dicebear.com/7.x/bottts/svg?seed=P3&backgroundColor=ffd5dc", "https://api.dicebear.com/7.x/micah/svg?seed=P4&backgroundColor=ffdfbf",
            "https://api.dicebear.com/7.x/shapes/svg?seed=P5&backgroundColor=d1d4f9", "https://api.dicebear.com/7.x/micah/svg?seed=P6&backgroundColor=b6e3f4",
            "https://api.dicebear.com/7.x/bottts/svg?seed=P7&backgroundColor=c0aede", "https://api.dicebear.com/7.x/shapes/svg?seed=P8&backgroundColor=ffd5dc",
            "https://api.dicebear.com/7.x/micah/svg?seed=P9&backgroundColor=ffdfbf", "https://api.dicebear.com/7.x/bottts/svg?seed=P10&backgroundColor=b6e3f4",
            "https://api.dicebear.com/7.x/shapes/svg?seed=P11&backgroundColor=d1d4f9", "https://api.dicebear.com/7.x/micah/svg?seed=P12&backgroundColor=c0aede"
        ];
        let avatarIndex = 0;
        document.getElementById('current-avatar').src = avatars[avatarIndex];
        
        // Single Avatar Frame controlled by Arrows
        document.getElementById('next-avatar').addEventListener('click', () => { avatarIndex = (avatarIndex + 1) % avatars.length; document.getElementById('current-avatar').src = avatars[avatarIndex]; });
        document.getElementById('prev-avatar').addEventListener('click', () => { avatarIndex = (avatarIndex - 1 + avatars.length) % avatars.length; document.getElementById('current-avatar').src = avatars[avatarIndex]; });

        // Join Transition
        document.getElementById('play-btn').addEventListener('click', () => {
            const name = document.getElementById('player-name').value.trim();
            if (name === "") return alert("Please enter a name!");
            document.getElementById('in-game-name').textContent = name;
            document.getElementById('in-game-avatar').src = avatars[avatarIndex];
            
            const lobby = document.getElementById('lobby-screen');
            lobby.classList.add('zoom-out-fade');
            
            setTimeout(() => {
                lobby.classList.add('hidden');
                document.getElementById('game-page').classList.remove('hidden');
                setTimeout(initCanvas, 100);
                document.getElementById('overlay-words').classList.remove('hidden'); // Show words
            }, 500); 
        });

        // Timer Logic
        function hideOverlay() {
            document.getElementById('overlay-words').classList.add('hidden');
            let timeLeft = 60;
            const tText = document.getElementById('timer-text');
            const tIcon = document.getElementById('game-timer');
            setInterval(() => {
                if(timeLeft > 0) timeLeft--;
                tText.textContent = timeLeft;
                if(timeLeft <= 30) tIcon.classList.add('warning');
            }, 1000);
        }

        // Toasts & Moderation
        function showToast(guesserName) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast'; toast.innerHTML = `🌟 <strong>${guesserName}</strong> guessed the word!`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function toggleModMenu(e) {
            const menu = document.getElementById('mod-menu');
            menu.classList.remove('hidden'); menu.style.left = e.clientX + 'px'; menu.style.top = e.clientY + 'px';
        }
        function closeModMenu() { document.getElementById('mod-menu').classList.add('hidden'); }
        document.addEventListener('click', (e) => { if(!e.target.closest('.player-item')) closeModMenu(); });

        // Drawing Engine (With Flood Fill)
        const canvas = document.getElementById('drawingBoard'); const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let isDrawing = false, isErasing = false, isFilling = false, drawingHistory = [];
        let currentColor = '#000000', currentBrushSize = 3;

        function initCanvas() {
            canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight - 55; 
            ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height); saveState();
        }
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            if (e.touches) return { x: Math.floor(e.touches[0].clientX - rect.left), y: Math.floor(e.touches[0].clientY - rect.top) };
            return { x: Math.floor(e.clientX - rect.left), y: Math.floor(e.clientY - rect.top) };
        }
        function startAction(e) {
            const pos = getPos(e);
            if (isFilling) { smartFloodFill(pos.x, pos.y, currentColor); return; }
            isDrawing = true; ctx.beginPath(); ctx.moveTo(pos.x, pos.y); draw(e); 
        }
        function endAction() { if (isDrawing) { isDrawing = false; ctx.closePath(); saveState(); } }
        function draw(e) {
            if (!isDrawing || isFilling) return; e.preventDefault(); 
            ctx.lineWidth = currentBrushSize; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.strokeStyle = isErasing ? "white" : currentColor; ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke();
        }
        canvas.addEventListener('mousedown', startAction); canvas.addEventListener('mouseup', endAction);
        canvas.addEventListener('mousemove', draw); canvas.addEventListener('mouseout', endAction);
        canvas.addEventListener('touchstart', startAction, {passive: false}); canvas.addEventListener('touchend', endAction); canvas.addEventListener('touchmove', draw, {passive: false});

        // Smart Flood Fill
        function hexToRgba(hex) { let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); return {r, g, b, a: 255}; }
        function smartFloodFill(startX, startY, fillHex) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height); const data = imageData.data; const w = canvas.width, h = canvas.height;
            const startPos = (startY * w + startX) * 4; const startR = data[startPos], startG = data[startPos + 1], startB = data[startPos + 2];
            const fill = hexToRgba(fillHex);
            if (startR === fill.r && startG === fill.g && startB === fill.b) return;
            const stack = [[startX, startY]];
            while (stack.length > 0) {
                let [x, y] = stack.pop(); let pos = (y * w + x) * 4;
                while (y >= 0 && matchColor(pos)) { y--; pos -= w * 4; }
                pos += w * 4; y++; let rL = false, rR = false;
                while (y < h && matchColor(pos)) {
                    data[pos] = fill.r; data[pos+1] = fill.g; data[pos+2] = fill.b; data[pos+3] = 255; 
                    if (x > 0) { if (matchColor(pos - 4)) { if (!rL) { stack.push([x - 1, y]); rL = true; } } else if (rL) { rL = false; } }
                    if (x < w - 1) { if (matchColor(pos + 4)) { if (!rR) { stack.push([x + 1, y]); rR = true; } } else if (rR) { rR = false; } }
                    y++; pos += w * 4;
                }
            }
            ctx.putImageData(imageData, 0, 0); saveState();
            function matchColor(p) { return data[p] === startR && data[p+1] === startG && data[p+2] === startB; }
        }

        // Toolbar Logic
        const btnColor = document.getElementById('tool-color-btn'), popupColor = document.getElementById('color-popup');
        const btnSize = document.getElementById('tool-size-btn'), popupSize = document.getElementById('size-popup');
        btnColor.addEventListener('click', () => { popupColor.classList.toggle('hidden'); popupSize.classList.add('hidden'); });
        btnSize.addEventListener('click', () => { popupSize.classList.toggle('hidden'); popupColor.classList.add('hidden'); });
        canvas.addEventListener('touchstart', () => { popupColor.classList.add('hidden'); popupSize.classList.add('hidden'); });

        const palette = ['#000000', '#ffffff', '#ef4444', '#3b82f6', '#22c55e', '#eab308', '#a855f7', '#f97316', '#ec4899', '#06b6d4', '#84cc16', '#8b5cf6'];
        const grid = document.getElementById('color-grid');
        palette.forEach(col => {
            let div = document.createElement('div'); div.className = 'color-swatch'; div.style.backgroundColor = col; if(col === '#000000') div.classList.add('active');
            div.addEventListener('click', () => {
                document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
                div.classList.add('active'); currentColor = col; document.getElementById('color-indicator').style.backgroundColor = col;
                setTool('tool-pencil'); popupColor.classList.add('hidden');
            }); grid.appendChild(div);
        });

        document.getElementById('native-color').addEventListener('input', (e) => { currentColor = e.target.value; document.getElementById('color-indicator').style.backgroundColor = e.target.value; setTool('tool-pencil'); });
        document.getElementById('tool-size').addEventListener('input', (e) => { currentBrushSize = e.target.value; document.getElementById('size-label').textContent = currentBrushSize; });

        function setTool(id) {
            isErasing = (id === 'tool-eraser'); isFilling = (id === 'tool-fill'); 
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).classList.add('active');
        }

        document.getElementById('tool-pencil').addEventListener('click', () => setTool('tool-pencil'));
        document.getElementById('tool-eraser').addEventListener('click', () => setTool('tool-eraser'));
        document.getElementById('tool-fill').addEventListener('click', () => setTool('tool-fill'));
        document.getElementById('tool-trash').addEventListener('click', () => { ctx.fillStyle = "white"; ctx.fillRect(0, 0, canvas.width, canvas.height); saveState(); setTool('tool-pencil'); });

        function saveState() { drawingHistory.push(canvas.toDataURL()); if (drawingHistory.length > 15) drawingHistory.shift(); }
        document.getElementById('tool-undo').addEventListener('click', () => {
            if (drawingHistory.length > 1) {
                drawingHistory.pop(); const img = new Image(); img.src = drawingHistory[drawingHistory.length - 1];
                img.onload = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.drawImage(img, 0, 0); };
            }
        });

        // Chat & Toast Simulator
        document.getElementById('chat-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const msgText = document.getElementById('chat-input').value.trim();
            if (msgText !== '') {
                const name = document.getElementById('in-game-name').textContent;
                
                // If they type "apple", it shows the floating toast notification instead of a message!
                if(msgText.toLowerCase() === "apple") {
                    showToast(name);
                } else {
                    const msgSpan = document.createElement('span'); msgSpan.className = 'chat-msg';
                    msgSpan.innerHTML = `<strong>${name}:</strong> ${msgText}`;
                    document.getElementById('chat-box').appendChild(msgSpan);
                }
                
                document.getElementById('chat-input').value = ''; document.getElementById('chat-input').blur(); 
                document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
            }
        });
    </script>
</body>
</html>
