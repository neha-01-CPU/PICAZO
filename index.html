<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picazo</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div id="lobby-screen" class="active-screen">
        <div class="theme-toggle">
            <i data-lucide="sun" class="icon-sun"></i>
            <div class="toggle-track"><div class="toggle-knob"></div></div>
            <i data-lucide="moon" class="icon-moon"></i>
        </div>

        <div class="glass-card">
            <div class="logo-container">
                <div class="logo-icon"></div>
                <h1 class="logo-text">Picazo</h1>
            </div>
            <p class="subtitle">The Ultimate Drawing Game</p>

            <input type="text" id="player-name" class="name-input" placeholder="Enter your name" autocomplete="off">

            <p class="avatar-label">Choose your avatar</p>
            <div class="avatar-selector">
                <button id="prev-avatar" class="arrow-btn"><i data-lucide="chevron-left"></i></button>
                <div class="avatar-circle">
                    <img id="current-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&hair=short&facialHair=beardLight" alt="Avatar">
                </div>
                <button id="next-avatar" class="arrow-btn"><i data-lucide="chevron-right"></i></button>
            </div>

            <button id="play-btn" class="primary-btn">PLAY NOW</button>
            <button class="secondary-btn">CREATE PRIVATE ROOM</button>
        </div>
        <p class="footer-text">Made with ❤️ for testing</p>
    </div>

    <div id="game-page" class="hidden-screen">
        
        <header class="game-header glass-panel">
            <div class="header-left">
                <i data-lucide="clock" class="timer-icon"></i>
                <span id="timer">60</span>
            </div>
            <div class="header-center">
                <span class="word-blanks">_ _ _ _ _ (5)</span>
            </div>
            <div class="header-right">
                <button class="icon-btn"><i data-lucide="volume-2"></i></button>
            </div>
        </header>

        <main class="game-layout">
            
            <div class="canvas-container">
                <canvas id="drawing-board"></canvas>
                
                <div class="toolbar glass-panel">
                    <button class="tool-btn active"><i data-lucide="pencil"></i></button>
                    <button class="tool-btn"><i data-lucide="eraser"></i></button>
                    <button class="tool-btn"><i data-lucide="paint-bucket"></i></button>
                    <div class="color-picker-placeholder"></div>
                    <button class="tool-btn"><i data-lucide="undo-2"></i></button>
                    <button class="tool-btn"><i data-lucide="trash-2"></i></button>
                </div>
            </div>

            <div class="leaderboard-container glass-panel">
                <h3>Players</h3>
                <div class="player-list">
                    <div class="player-row drawing-now">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="tiny-avatar">
                        <span class="p-name">You</span>
                        <span class="p-score">0 pts</span>
                        <i data-lucide="pencil" class="draw-icon"></i>
                    </div>
                </div>
            </div>

            <div class="chat-container glass-panel">
                <h3>Chat</h3>
                <div class="chat-messages">
                    <p class="chat-msg"><i>System: Game started!</i></p>
                </div>
                <input type="text" class="chat-input" placeholder="Type your guess...">
            </div>

        </main>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
